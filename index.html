<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',system-ui,-apple-system,sans-serif;background:#eef1f6;color:#1a1a1a;min-height:100vh}

  /* ═══ LAYOUT: SIDEBAR IZQUIERDA + CONTENIDO ═══ */
  .app-shell{display:flex;min-height:100vh}
  .sidebar{width:236px;flex-shrink:0;background:linear-gradient(180deg,#0C447C 0%,#083058 60%,#062647 100%);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;box-shadow:4px 0 24px rgba(6,38,71,.25);z-index:100}
  .sb-brand{display:flex;align-items:center;gap:11px;padding:18px 16px 16px;border-bottom:1px solid rgba(255,255,255,.12)}
  .sb-escudo{width:46px;height:46px;border-radius:12px;background:#fff;padding:4px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.3)}
  .sb-escudo img{width:100%;height:100%;object-fit:contain}
  .sb-title{font-size:12.5px;font-weight:800;color:#fff;line-height:1.25;letter-spacing:.03em;text-transform:uppercase}
  .sb-sub{font-size:10px;font-weight:600;color:#8fb4d9;margin-top:3px;letter-spacing:.14em;text-transform:uppercase}
  .sb-nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
  .tab{display:flex;align-items:center;gap:12px;width:100%;padding:11px 14px;border-radius:11px;font-family:inherit;font-size:13.5px;font-weight:700;letter-spacing:.02em;cursor:pointer;color:rgba(255,255,255,.72);border:none;background:transparent;transition:.18s;text-align:left;position:relative}
  .tab .tab-ico{font-size:17px;width:22px;text-align:center;flex-shrink:0}
  .tab:hover{background:rgba(255,255,255,.09);color:#fff;transform:translateX(2px)}
  .tab.active{background:#fff;color:#0C447C;box-shadow:0 6px 18px rgba(0,0,0,.28);font-weight:800}
  .tab.active::before{content:'';position:absolute;left:-12px;top:20%;height:60%;width:4px;border-radius:0 4px 4px 0;background:#ffd166}
  .sb-footer{padding:14px 12px;border-top:1px solid rgba(255,255,255,.12)}
  .perfil-badge{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;font-size:12px;font-weight:700;letter-spacing:.03em;color:#fff;background:rgba(255,255,255,.13);padding:10px 12px;border-radius:10px;cursor:pointer;transition:.15s;border:1px solid rgba(255,255,255,.14)}
  .perfil-badge:hover{background:rgba(255,255,255,.22)}
  .main{flex:1;min-width:0}
  .topbar{position:sticky;top:0;z-index:90;background:rgba(238,241,246,.92);backdrop-filter:blur(8px);padding:14px 26px 12px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .tb-title{font-size:19px;font-weight:800;color:#0C447C;letter-spacing:.01em}
  .tb-sub{font-size:11px;font-weight:600;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase}
  .content{padding:20px 26px 40px;max-width:960px}

  .fc{background:#fff;border:1px solid #e6eaf0;border-radius:15px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(15,23,42,.05)}
  .sec-label{font-size:10.5px;font-weight:800;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em}
  .fr{display:grid;gap:10px;margin-bottom:12px}
  .fr2{grid-template-columns:1fr 1fr}
  .fr3{grid-template-columns:1fr 1fr 1fr}
  .fr1{grid-template-columns:1fr}
  input,select,textarea{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 11px;font-size:13px;background:#fff;color:#111;font-family:inherit;outline:none;transition:.1s}
  input:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
  textarea{resize:vertical;min-height:82px;line-height:1.5}
  .btns-row{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
  .btn-main{flex:1;padding:11px 14px;border-radius:10px;background:linear-gradient(135deg,#0C447C,#1663B0);color:#fff;font-family:inherit;font-size:13px;font-weight:800;letter-spacing:.03em;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.18s;box-shadow:0 4px 12px rgba(12,68,124,.28)}
  .btn-main:hover{transform:translateY(-1px);box-shadow:0 7px 18px rgba(12,68,124,.38);background:linear-gradient(135deg,#0d4d8d,#1a74cc)}
  .btn-main:disabled{opacity:.5;cursor:not-allowed}
  .btn-sn{flex:1;padding:10px;border-radius:8px;background:#f3f4f6;color:#374151;font-size:13px;font-weight:500;border:1px solid #e5e7eb;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .btn-sn:hover{background:#e5e7eb}
  .btn-mini{padding:5px 12px;border-radius:8px;font-family:inherit;font-size:11.5px;font-weight:700;letter-spacing:.02em;cursor:pointer;border:1px solid #dbe2ea;background:#fff;color:#334155;transition:.15s;box-shadow:0 1px 3px rgba(15,23,42,.06)}
  .btn-mini:hover{border-color:#0C447C;color:#0C447C;box-shadow:0 3px 8px rgba(12,68,124,.15);transform:translateY(-1px)}

  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .sb{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px}
  .sn{font-size:22px;font-weight:600;color:#111}
  .sl{font-size:11px;color:#6b7280;margin-top:2px}
  .sb.riesgo-alto{background:#fee2e2;border-color:#ef4444}.sb.riesgo-alto .sn{color:#dc2626}
  .sb.riesgo-medio{background:#fef3c7;border-color:#f59e0b}.sb.riesgo-medio .sn{color:#b45309}
  .sb.riesgo-bajo{background:#d1fae5;border-color:#10b981}.sb.riesgo-bajo .sn{color:#047857}

  .bdg{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em}
  .bdg-ALTO{background:#dc2626;color:#fff}
  .bdg-MEDIO{background:#f59e0b;color:#fff}
  .bdg-BAJO{background:#059669;color:#fff}
  .bdg-outline-ALTO{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
  .bdg-outline-MEDIO{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
  .bdg-outline-BAJO{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
  .bdg-gris{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;font-weight:500}

  .rc{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;margin-bottom:8px}
  .rc.alto{border-left:4px solid #dc2626}
  .rc.medio{border-left:4px solid #f59e0b}
  .rc.bajo{border-left:4px solid #059669}
  .rc.pendiente{border-left:4px solid #9ca3af}

  /* Nivel de riesgo selector */
  .riesgo-sel{display:flex;gap:6px}
  .riesgo-btn{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;transition:.1s}
  .riesgo-btn.sel-ALTO{background:#dc2626;border-color:#991b1b;color:#fff}
  .riesgo-btn.sel-MEDIO{background:#f59e0b;border-color:#b45309;color:#fff}
  .riesgo-btn.sel-BAJO{background:#059669;border-color:#047857;color:#fff}

  /* Checklist */
  .chk-grupo{border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;overflow:hidden}
  .chk-grupo-h{background:#f9fafb;padding:8px 12px;font-size:12px;font-weight:600;color:#374151;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .chk-item{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;border-top:1px solid #f3f4f6;cursor:pointer}
  .chk-item:hover{background:#f9fafb}
  .chk-item input[type=checkbox]{width:17px;height:17px;flex-shrink:0;margin-top:1px;accent-color:#0C447C;cursor:pointer}
  .chk-item .txt{font-size:12.5px;color:#374151;line-height:1.4}

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";

// ── LOGIN / USUARIOS — gestionados desde Firestore (colección air_usuarios) ──
// El admin agrega/quita usuarios y permisos desde la pestaña 👥 Usuarios,
// sin tocar el código. Primer ingreso: se crean DIP y DSED como admins.
const MODULOS = [
  { id:'h', label:'🏠 Inicio' },
  { id:'i', label:'📋 Informes' },
  { id:'p', label:'📄 Partes U.C.O.' },
  { id:'e', label:'📊 Equipos' },
  { id:'v', label:'⚔️ Rivalidades' },
  { id:'r', label:'⚠️ Radicalizados' },
  { id:'n', label:'📰 Noticias' },
];
const TODOS_MODULOS = MODULOS.map(m => m.id);
let currentUser = null;
let usuarios = [];

async function seedUsuariosSiVacio() {
  const snap = await getDocs(collection(db,'air_usuarios'));
  if (!snap.empty) return;
  await setDoc(doc(db,'air_usuarios','DIP'),  { nombre:'División Informes Preventivos', clave:'DIP-UCO', admin:true, activo:true, permisos:TODOS_MODULOS, creado:serverTimestamp() });
  await setDoc(doc(db,'air_usuarios','DSED'), { nombre:'Departamento DSED', clave:'parte1', admin:true, activo:true, permisos:TODOS_MODULOS, creado:serverTimestamp() });
}

window.intentarLogin = async () => {
  const user = (document.getElementById('login-user').value||'').trim().toUpperCase();
  const pass = document.getElementById('login-pass').value;
  const box = document.getElementById('login-error-box');
  if (!user || !pass) { box.innerHTML = `<div class="login-error">⚠️ Completá usuario y contraseña</div>`; return; }
  box.innerHTML = `<div style="font-size:12px;color:#6b7280;margin-bottom:12px">Verificando...</div>`;
  try {
    await seedUsuariosSiVacio();
    const d = await getDoc(doc(db,'air_usuarios',user));
    if (!d.exists() || d.data().clave !== pass) {
      box.innerHTML = `<div class="login-error">⚠️ Usuario o contraseña incorrectos</div>`;
      document.getElementById('login-pass').value = ''; return;
    }
    if (d.data().activo === false) { box.innerHTML = `<div class="login-error">⚠️ Usuario deshabilitado. Contactá a un administrador.</div>`; return; }
    sessionStorage.setItem('air_user', user);
    iniciarApp(user, { id:user, ...d.data() });
  } catch(e) {
    box.innerHTML = `<div class="login-error">⚠️ Error de conexión: ${e.message}</div>`;
  }
};
window.cerrarSesion = () => {
  if (!confirm('¿Cerrar sesión?')) return;
  sessionStorage.removeItem('air_user');
  location.reload();
};

const _libsCargadas = {};
function loadScript(src) {
  if (_libsCargadas[src]) return _libsCargadas[src];
  _libsCargadas[src] = new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = () => rej(new Error('No se pudo cargar ' + src));
    document.head.appendChild(s);
  });
  return _libsCargadas[src];
}

// Nombres buscables (clubes + alias), de más largo a más corto, para detección en texto libre
const BUSCABLES = [...CLUBES, ...Object.keys(ALIAS_CLUBES)].sort((a,b) => b.length - a.length);

function lev(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  let prev = Array.from({length:n+1}, (_,j) => j);
  for (let i = 1; i <= m; i++) {
    const cur = [i];
    for (let j = 1; j <= n; j++) cur[j] = Math.min(prev[j]+1, cur[j-1]+1, prev[j-1] + (a[i-1]===b[j-1]?0:1));
    prev = cur;
  }
  return prev[n];
}
function mejorSugerencia(n) {
  let mejor = null, md = Infinity;
  for (const c of CLUBES) { const d = lev(n, c); if (d < md) { md = d; mejor = c; } }
  return md <= Math.max(2, Math.floor(n.length * 0.4)) ? mejor : null;
}
// Resuelve un texto libre a un club de la base: exacto → alias → contenido único → desconocido (con sugerencia)
function resolverClub(txt) {
  const n = norm(txt);
  if (!n) return { club:'', estado:'vacio' };
  if (RIV[n]) return { club:n, estado:'ok' };
  if (ALIAS_CLUBES[n]) return { club:ALIAS_CLUBES[n], estado:'alias' };
  const cand = CLUBES.filter(c => c.includes(n) || n.includes(c));
  if (cand.length === 1) return { club:cand[0], estado:'alias' };
  return { club:n, estado:'desconocido', sugerencia: mejorSugerencia(n) };
}
// Versión interactiva para formularios: corrige solo, pregunta si hay dudas, null = cancelar
function validarClubInteractivo(txt, campo) {
  const r = resolverClub(txt);
  if (r.estado === 'ok') return r.club;
  if (r.estado === 'alias') return r.club;
  if (r.sugerencia) {
    return confirm(`⚠️ "${norm(txt)}" (${campo}) no está en la base de rivalidades.\n\n¿Quisiste decir "${r.sugerencia}"?\n\nAceptar: usar ${r.sugerencia}\nCancelar: guardar "${norm(txt)}" tal cual (no va a cruzar rivalidades ni antecedentes)`) ? r.sugerencia : r.club;
  }
  return confirm(`⚠️ "${norm(txt)}" (${campo}) no está en la base de rivalidades y no encontré ninguno parecido.\n\n¿Guardarlo igual? No va a cruzar rivalidades, alianzas ni antecedentes en el motor de riesgo.`) ? r.club : null;
}

// Relaciones personalizadas cargadas desde la app (colección air_rivalidades).
// Pisan a la base RIV y pueden llevar una reseña con el historial de hechos.
let rivCustom = {};
function rivKey(a, b) { const [x, y] = [norm(a), norm(b)].sort(); return `${x}__${y}`; }
function getCustomRel(a, b) { return rivCustom[rivKey(a, b)] || null; }

// Reseñas de base — doc "Rivalidades Históricas del Fútbol Porteño" (caps. X a XVII).
// Una reseña personalizada cargada desde la app (air_rivalidades) pisa a la de base.
const RESENAS_BASE = {};
[
  ['DEPORTIVO RIESTRA', 'SACACHISPAS',
   'Clásico de la Vecindad (Bajo Flores–Soldati), rivalidad territorial desde 1950. Décadas de paridad y fricción barrial en C y D. Hoy sin cruces oficiales por brecha de categorías; previa de alto fervor si se reedita.'],
  ['DEFENSORES DE BELGRANO', 'EXCURSIONISTAS',
   'Clásico del Bajo, entre los más antiguos del fútbol porteño (1917). Historial de alta hostilidad entre parcialidades y operativos exigidos en los 80 y 90. Sin categoría en común, pero la pica sigue plenamente vigente.'],
  ['GENERAL LAMADRID', 'COMUNICACIONES',
   'Clásico de los Barrios (Devoto–Agronomía), vecinal por excelencia del centro porteño desde 1960. Banderazos masivos en cada edición pese a restricciones al visitante. Sin cruces regulares por diferencia de categorías.'],
  ['DEPORTIVO ESPAÑOL', 'SPORTIVO ITALIANO',
   'Clásico de las Colectividades, único en el mundo. Auge en los 80 en Primera; reencuentros de alta tensión en B Metro y C. Duelos recientes en el Nueva España con pica vigente y fuerte carga identitaria.'],
  ['BARRACAS CENTRAL', 'SPORTIVO BARRACAS',
   'Clásico de Barracas, disputa histórica del sur desde los años 20. Duelos ásperos en C y D hasta los 90. En receso oficial por distancia institucional; peso simbólico más que riesgo operativo actual.'],
].forEach(([a, b, r]) => { RESENAS_BASE[rivKey(a, b)] = r; });

function getResena(a, b) { return getCustomRel(a, b)?.resena || RESENAS_BASE[rivKey(a, b)] || ''; }

function getRelacion(a, b) {
  a = norm(a); b = norm(b);
  const cust = getCustomRel(a, b);
  if (cust) {
    if (cust.nivel === 'ninguna' || cust.nivel === 'ali') return cust.nivel === 'ali' ? null : null;
    return cust.nivel;
  }
  const da = RIV[a], dbb = RIV[b];
  for (const nivel of ['max','enem','conf','tens','resp']) {
    if ((da && da[nivel].map(norm).includes(b)) || (dbb && dbb[nivel].map(norm).includes(a))) return nivel;
  }
  return null;
}
function esRival(a, b) { const r = getRelacion(a,b); return r && r !== 'resp'; }
function getAlianzas(club) {
  const c = norm(club);
  const base = RIV[c] ? RIV[c].ali.slice() : [];
  Object.values(rivCustom).forEach(rc => {
    if (rc.nivel !== 'ali') return;
    if (norm(rc.a) === c && !base.map(norm).includes(norm(rc.b))) base.push(rc.b);
    if (norm(rc.b) === c && !base.map(norm).includes(norm(rc.a))) base.push(rc.a);
  });
  return base;
}

function conectarFirebase() {
  unsubs.push(onSnapshot(collection(db,'air_usuarios'), snap => {
    usuarios = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentUser) {
      const yo = usuarios.find(u => u.id === currentUser.id);
      if (!yo || yo.activo === false) { sessionStorage.removeItem('air_user'); alert('Tu usuario fue deshabilitado o eliminado por un administrador.'); location.reload(); return; }
      currentUser = yo;
      aplicarPermisos();
    }
    render();
  }));
  unsubs.push(onSnapshot(query(collection(db,'air_fixture'), orderBy('fecha','asc')), snap => {
    fixture = snap.docs.map(d => ({ id: d.id, ...d.data() })); render();
  }));
  unsubs.push(onSnapshot(query(collection(db,'air_informes'), orderBy('creado','desc')), snap => {
    informes = snap.docs.map(d => ({ id: d.id, ...d.data() })); render();
  }));
  unsubs.push(onSnapshot(collection(db,'air_equipos'), snap => {
    equiposExtra = {}; snap.docs.forEach(d => equiposExtra[d.id] = d.data()); render();
  }));
  unsubs.push(onSnapshot(query(collection(db,'radicalizados_copa'), orderBy('ts','desc')), snap => {
    radicalizados = snap.docs.map(d => ({ id: d.id, ...d.data() })); render();
  }));
  unsubs.push(onSnapshot(query(collection(db,'air_partes'), orderBy('fecha','desc')), snap => {
    partes = snap.docs.map(d => ({ id: d.id, ...d.data() })); render();
  }));
  unsubs.push(onSnapshot(query(collection(db,'air_antecedentes'), orderBy('fecha','desc')), snap => {
    antecedentes = snap.docs.map(d => ({ id: d.id, ...d.data() })); render();
  }));
  unsubs.push(onSnapshot(query(collection(db,'air_papelera'), orderBy('eliminadoEn','desc')), snap => {
    papelera = snap.docs.map(d => ({ id: d.id, ...d.data() })); render();
  }));
  unsubs.push(onSnapshot(collection(db,'air_rivalidades'), snap => {
    rivCustom = {}; snap.docs.forEach(d => rivCustom[d.id] = { id: d.id, ...d.data() }); render();
  }));
  setTimeout(() => { document.getElementById('loading-overlay').style.display='none'; document.getElementById('app').style.display='block'; render(); }, 600);
}

}

// Fecha de HOY en hora LOCAL (toISOString usa UTC: de 21 a 24 hs Argentina daría mañana)
function fechaHoyLocal() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
const fmt = ts => { try { if (!ts) return '—'; const v = (typeof ts === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(ts)) ? ts + 'T12:00:00' : ts; const d = v?.toDate ? v.toDate() : new Date(v); if (isNaN(d.getTime())) return '—'; return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}); } catch(e){ return '—'; } };
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const DIAS = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function fechaLarga(iso){ if(!iso) return '—'; const d = new Date(iso+'T12:00:00'); return `día ${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]} del ${d.getFullYear()}`; }

// PAPELERA — todo borrado pasa por acá: se puede deshacer al instante (toast)
// o restaurar después desde la pestaña Usuarios (admin). Conserva el ID original,
// así los vínculos (informe ↔ partido, etc.) quedan intactos al restaurar.
// ═══════════════════════════════════════════════════════════════════════════════
let papelera = [];
const COL_LABEL = { air_fixture:'Partido', air_informes:'Informe de riesgo', air_antecedentes:'Antecedente', air_partes:'Parte U.C.O.', radicalizados_copa:'Radicalizado' };
// Convierte Timestamps a Date para que sobrevivan el viaje a la papelera y vuelvan como Timestamps
function limpiarTs(o){ const r = {}; for (const [k,v] of Object.entries(o||{})) r[k] = (v && typeof v.toDate === 'function') ? v.toDate() : v; return r; }

async function borrarConPapelera(col, id, etiqueta) {
  try {
    const ref = doc(db, col, id);
    const snap = await getDoc(ref);
    if (!snap.exists()) return;
    const pid = `${col}__${id}`;
    await setDoc(doc(db,'air_papelera', pid), {
      col, docId: id, data: limpiarTs(snap.data()),
      etiqueta: etiqueta || COL_LABEL[col] || col,
      eliminadoEn: serverTimestamp(), por: currentUser?.id || '',
    });
    await deleteDoc(ref);
    mostrarUndo(pid, etiqueta || COL_LABEL[col] || 'Elemento');
  } catch(e) { alert('No se pudo eliminar: ' + e.message); }
}
function mostrarUndo(pid, etiqueta) {
  document.getElementById('undo-toast')?.remove();
  const t = document.createElement('div');
  t.id = 'undo-toast';
  t.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;display:flex;gap:12px;align-items:center;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.35);max-width:92vw';
  t.innerHTML = `🗑 ${esc(etiqueta)} eliminado <button style="background:#fbbf24;border:none;color:#111827;font-weight:700;padding:5px 14px;border-radius:8px;cursor:pointer;white-space:nowrap" onclick="restaurarPapelera('${pid}');this.parentElement.remove()">↩️ Deshacer</button>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 10000);
}
window.restaurarPapelera = async pid => {
  const snap = await getDoc(doc(db,'air_papelera', pid));
  if (!snap.exists()) { alert('Este elemento ya no está disponible para restaurar.'); return; }
  const pd = snap.data();
  await setDoc(doc(db, pd.col, pd.docId), pd.data);
  await deleteDoc(doc(db,'air_papelera', pid));
};
window.purgarPapelera = async pid => {
  if (!confirm('¿Eliminar DEFINITIVAMENTE este elemento de la papelera? No se puede deshacer.')) return;
  await deleteDoc(doc(db,'air_papelera', pid));
};
window.vaciarPapelera = async () => {
  if (!papelera.length) return;
  if (!confirm(`¿Vaciar la papelera completa (${papelera.length} elemento${papelera.length!==1?'s':''})? Es DEFINITIVO.`)) return;
  for (const p of papelera) await deleteDoc(doc(db,'air_papelera', p.id));
};

// ═══════════════════════════════════════════════════════════════════════════════
// MOTOR DE SUGERENCIA DE RIESGO
// Cruza: rivalidad directa · alianzas cruzadas · antecedentes en informes previos ·
// flags del perfil de equipo (interna en la barra) · datos del checklist.
// ═══════════════════════════════════════════════════════════════════════════════
function historialEquipo(club) {
  const n = norm(club);
  return informes.filter(inf => norm(inf.local) === n || norm(inf.visitante) === n);
}
function sugerirRiesgo(local, visitante, opts = {}) {
  const factores = []; let score = 0;
  const L = norm(local), V = norm(visitante);
  if (!L || !V) return { riesgo: 'BAJO', score: 0, factores: [{t:'info', txt:'Seleccioná ambos equipos para calcular la sugerencia.'}] };

  // 1) Rivalidad directa
  const rel = getRelacion(L, V);
  if (rel) {
    const nv = NIVELES_REL[rel];
    score += nv.pts;
    const resena = getResena(L, V);
    factores.push({ t: nv.pts > 0 ? 'pos' : 'neg', txt: `${nv.pts>0?'⚔️':'🤝'} Relación directa entre parcialidades: ${nv.label} (${nv.desc}).${resena ? ' Historial: ' + esc(resena.slice(0, 220)) + (resena.length > 220 ? '…' : '') : ''}`, pts: nv.pts });
  } else {
    factores.push({ t: 'info', txt: 'ℹ️ Sin rivalidad directa registrada entre ambas parcialidades.', pts: 0 });
  }

  // 2) Alianzas cruzadas (ej.: Defensores de Belgrano ↔ Almirante Brown vs Morón)
  const cruces = [];
  getAlianzas(L).forEach(ali => { if (esRival(ali, V)) { const esMax = getRelacion(ali,V)==='max'; cruces.push({ pts: esMax?3:2, txt:`La radicalizada de ${L} mantiene vínculo de "amistad" con la de ${norm(ali)}, ${esMax?'clásico rival':'rival'} de ${V}. Podrían intentar sumarse a la parcialidad local.` }); } });
  getAlianzas(V).forEach(ali => { if (esRival(ali, L)) { const esMax = getRelacion(ali,L)==='max'; cruces.push({ pts: esMax?3:2, txt:`La radicalizada de ${V} mantiene vínculo de "amistad" con la de ${norm(ali)}, ${esMax?'clásico rival':'rival'} de ${L}.` }); } });
  cruces.forEach(c => { score += c.pts; factores.push({ t:'pos', txt: `🔗 Alianza cruzada: ${c.txt}`, pts: c.pts }); });

  // 3) Antecedentes en informes previos (últimos 24 meses)
  [L, V].forEach(club => {
    const hist = historialEquipo(club).filter(i => i.id !== opts.excluirId);
    const altos = hist.filter(i => i.riesgo === 'ALTO').length;
    const medios = hist.filter(i => i.riesgo === 'MEDIO').length;
    if (altos >= 2)      { score += 3; factores.push({ t:'pos', txt:`📕 ${club}: registra ${altos} informes previos con conflictividad ALTA.`, pts: 3 }); }
    else if (altos === 1){ score += 2; factores.push({ t:'pos', txt:`📙 ${club}: registra 1 informe previo con conflictividad ALTA.`, pts: 2 }); }
    else if (medios >= 2){ score += 1; factores.push({ t:'pos', txt:`📒 ${club}: registra ${medios} informes previos con conflictividad MEDIA.`, pts: 1 }); }
  });

  // 3b) Antecedentes operativos (partes U.C.O. y noticias guardadas) con decaimiento temporal
  const hoyMs = Date.now();
  const diasDesde = f => Math.floor((hoyMs - new Date((f||'') + 'T12:00:00').getTime()) / 86400000);
  [L, V].forEach(club => {
    let pts = 0; let grav = 0, men = 0;
    partes.filter(pa => (norm(pa.local) === club || norm(pa.visitante) === club) && pa.gravedad && pa.gravedad !== 'sin').forEach(pa => {
      const d = diasDesde(pa.fecha); if (isNaN(d) || d > 365) return;
      if (pa.gravedad === 'grave') { pts += d <= 90 ? 2 : 1; grav++; }
      else { if (d <= 90) pts += 1; men++; }
    });
    antecedentes.filter(a => norm(a.club) === club && a.estado !== 'pendiente').forEach(a => {
      const d = diasDesde(a.fecha); if (isNaN(d) || d > 365) return;
      if (a.gravedad === 'grave') { pts += d <= 90 ? 2 : 1; grav++; }
      else { if (d <= 90) pts += 1; men++; }
    });
    pts = Math.min(pts, 3);
    if (pts > 0) { score += pts; factores.push({ t:'pos', txt:`🗂️ ${club}: antecedentes operativos en los últimos 12 meses (${grav} grave${grav===1?'':'s'}, ${men} menor${men===1?'':'es'}) — mayor peso a los últimos 90 días.`, pts }); }
  });

  // 3c) Historial head-to-head (cruces previos entre estos dos equipos)
  const h2hPartes = partes.filter(pa => {
    const a = norm(pa.local), b = norm(pa.visitante);
    return ((a === L && b === V) || (a === V && b === L)) && pa.gravedad && pa.gravedad !== 'sin';
  }).sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
  let h2hPts = 0;
  if (h2hPartes.length) {
    const ult = h2hPartes[0];
    h2hPts = ult.gravedad === 'grave' ? 3 : 2;
    factores.push({ t:'pos', txt:`🔁 Cruce previo entre ambos equipos con ${ult.gravedad === 'grave' ? 'incidentes graves' : 'incidentes'} (${fmt(ult.fecha)}${ult.nro ? ', Informe U.C.O. Nro. '+ult.nro : ''}).`, pts: h2hPts });
  }
  const h2hInf = informes.filter(i => {
    if (i.id === opts.excluirId || i.estado !== 'finalizado') return false;
    const a = norm(i.local), b = norm(i.visitante);
    return ((a === L && b === V) || (a === V && b === L)) && i.riesgo === 'ALTO';
  });
  if (h2hInf.length && h2hPts < 3) {
    const add = Math.min(2, 3 - h2hPts);
    h2hPts += add;
    factores.push({ t:'pos', txt:`📕 El último análisis de este mismo emparejamiento se graduó como conflictividad ALTA.`, pts: add });
  }
  score += h2hPts;

  // 4) Flags del perfil de equipo
  [L, V].forEach(club => {
    const e = equiposExtra[club];
    if (e?.interna)   { score += 2; factores.push({ t:'pos', txt:`🔺 ${club}: interna / disputa de poder vigente en la facción radicalizada${e.internaDetalle ? ' ('+esc(e.internaDetalle)+')' : ''}.`, pts: 2 }); }
    if (e?.incidentesRecientes) { score += 2; factores.push({ t:'pos', txt:`🚨 ${club}: incidentes recientes registrados${e.incidentesDetalle ? ' ('+esc(e.incidentesDetalle)+')' : ''}.`, pts: 2 }); }
  });

  // 5) Datos del análisis (checklist / formulario)
  if (opts.visitantePermitida) { score += 2; factores.push({ t:'pos', txt:'👥 Encuentro con parcialidad visitante habilitada.', pts: 2 }); }
  if (opts.tipoPartido === 'clasico')     { score += 2; factores.push({ t:'pos', txt:'🏟️ Partido catalogado como CLÁSICO.', pts: 2 }); }
  if (opts.tipoPartido === 'definitorio') { score += 2; factores.push({ t:'pos', txt:'🏆 Partido DEFINITORIO (ascenso, descenso, clasificación o final).', pts: 2 }); }
  if (opts.trascendencia === 'alta')      { score += 1; factores.push({ t:'pos', txt:'📈 Trascendencia deportiva alta.', pts: 1 }); }
  if (opts.internacional) { score += 1; factores.push({ t:'pos', txt:'🌎 Encuentro internacional: contingente visitante sudamericano — coordinar con contrapartes del país de origen (protocolo 5.10).', pts: 1 }); }
  if (opts.hora && parseInt(opts.hora) >= 20) { score += 1; factores.push({ t:'pos', txt:'🌙 Encuentro en horario nocturno: desconcentración con baja visibilidad y menor circulación en la vía pública.', pts: 1 }); }
  if (opts.fecha) {
    const fp = new Date(opts.fecha + 'T12:00:00');
    [L, V].forEach(club => {
      const fs = (equiposExtra[club]?.fechasSensibles || '').split('\n').map(s => s.trim()).filter(Boolean);
      fs.forEach(linea => {
        const m = linea.match(/^(\d{1,2})[\/\-](\d{1,2})\s*[—\-|]?\s*(.*)$/);
        if (!m) return;
        const aniv = new Date(fp.getFullYear(), parseInt(m[2]) - 1, parseInt(m[1]), 12);
        const dif = Math.abs(fp - aniv) / 86400000;
        if (dif <= 3) { score += 2; factores.push({ t:'pos', txt:`🕯️ ${club}: fecha sensible próxima al encuentro (${m[1]}/${m[2]}${m[3] ? ' — ' + esc(m[3]) : ''}).`, pts: 2 }); }
      });
    });
  }

  // 6) Último partido de LOCAL de cada equipo (partes U.C.O.): endurece o ablanda
  [L, V].forEach(club => {
    const up = ultimoPartidoLocal(club, opts.fecha);
    if (!up) return;
    if (up.gravedad === 'grave')      { score += 2; factores.push({ t:'pos', txt:`🔥 ${club}: INCIDENTES GRAVES en su último partido de local (vs ${esc(up.visitante)}, ${fmt(up.fecha)}).`, pts: 2 }); }
    else if (up.gravedad === 'menor') { score += 1; factores.push({ t:'pos', txt:`⚡ ${club}: incidentes menores en su último partido de local (vs ${esc(up.visitante)}, ${fmt(up.fecha)}).`, pts: 1 }); }
    else                              { score -= 1; factores.push({ t:'neg', txt:`🕊️ ${club}: último partido de local SIN NOVEDADES (vs ${esc(up.visitante)}, ${fmt(up.fecha)}).`, pts: -1 }); }
  });

  // 7) Situación en la tabla de posiciones (Promiedos): lo que hay en juego
  if (opts.tabla) {
    const zonas = [];
    [['local', L], ['visitante', V]].forEach(([lado, club]) => {
      const t = opts.tabla[lado];
      if (!t || !t.zona) return;
      zonas.push(t.zona);
      if (t.zona === 'descenso')       { score += 2; factores.push({ t:'pos', txt:`📉 ${club}: en ZONA BAJA de la tabla (${t.pos}° de ${t.total}, ${t.pts} pts) — clima de tensión por la permanencia.`, pts: 2 }); }
      else if (t.zona === 'definicion'){ score += 1; factores.push({ t:'pos', txt:`📈 ${club}: en ZONA DE DEFINICIÓN (${t.pos}° de ${t.total}, ${t.pts} pts) — mayor convocatoria y ansiedad por el resultado.`, pts: 1 }); }
    });
    if (zonas.length === 2 && zonas.every(z => z === 'media')) { score -= 1; factores.push({ t:'neg', txt:`⚪ Ambos equipos en mitad de tabla, sin urgencias deportivas en juego.`, pts: -1 }); }
  }

  const riesgo = score >= 5 ? 'ALTO' : score >= 3 ? 'MEDIO' : 'BAJO';
  return { riesgo, score, factores };
}

// Último partido de LOCAL de un club según los partes U.C.O. (últimos 180 días)
function ultimoPartidoLocal(club, antesDe) {
  const tope = antesDe || fechaHoyLocal();
  const piso = new Date(new Date(tope + 'T12:00:00') - 180 * 864e5).toISOString().slice(0,10);
  const c = norm(club);
  const propios = partes.filter(pa => norm(pa.local) === c && pa.fecha && pa.fecha < tope && pa.fecha >= piso)
    .sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));
  return propios[0] || null;
}

// Detecta clubes conocidos (base + alias) en un texto, de nombre más largo a más corto
function detectarClubesEnTexto(t) {
  let n = ' ' + norm(t).replace(/[^A-ZÑ0-9 ().]/g, ' ').replace(/\s+/g, ' ') + ' ';
  const hallados = [];
  for (const b of BUSCABLES) {
    let idx = n.indexOf(' ' + b + ' ');
    while (idx >= 0) {
      hallados.push({ pos: idx, club: RIV[b] ? b : ALIAS_CLUBES[b] });
      n = n.slice(0, idx + 1) + '#'.repeat(b.length) + n.slice(idx + 1 + b.length);
      idx = n.indexOf(' ' + b + ' ');
    }
  }
  hallados.sort((a, b) => a.pos - b.pos);
  const out = [];
  for (const h of hallados) if (!out.includes(h.club)) out.push(h.club);
  return out;
}
function limpiarNombreLibre(t) {
  return norm(t).replace(/\b(LUNES|MARTES|MIERCOLES|JUEVES|VIERNES|SABADO|DOMINGO|CANCHA|ESTADIO|HS|HORAS|FECHA)\b/g, ' ')
    .replace(/[^A-ZÑ0-9 ().]/g, ' ').replace(/\s+/g, ' ').trim();
}
window.detectarFixturePegado = () => {
  const txt = document.getElementById('fx-pegar-texto')?.value || '';
  if (!txt.trim()) { alert('Pegá el texto de la programación primero.'); return; }
  const filas = [];
  let fechaVigente = '';
  const anio = new Date().getFullYear();
  for (let linea of txt.split('\n')) {
    linea = linea.trim();
    if (!linea) continue;
    // Fecha (DD/MM o DD/MM/AAAA o DD-MM)
    let fecha = '';
    const fm = linea.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);
    if (fm && parseInt(fm[1]) <= 31 && parseInt(fm[2]) <= 12) {
      const a = fm[3] ? (fm[3].length === 2 ? '20' + fm[3] : fm[3]) : String(anio);
      fecha = `${a}-${fm[2].padStart(2,'0')}-${fm[1].padStart(2,'0')}`;
    }
    const sinFecha = fm ? linea.replace(fm[0], ' ') : linea;
    // Hora (HH:MM o HH.MM)
    let hora = '';
    const hm = sinFecha.match(/(\d{1,2})[:.](\d{2})/);
    if (hm && parseInt(hm[1]) <= 23 && parseInt(hm[2]) <= 59) hora = hm[1].padStart(2,'0') + ':' + hm[2];
    const sinHora = hm ? sinFecha.replace(hm[0], ' ') : sinFecha;
    // Equipos: primero intenta "X vs Y", si no, detecta 2 clubes conocidos en la línea
    let local = '', visitante = '';
    const vsM = sinHora.split(/\s+(?:VS\.?|V\/S|VERSUS)\s+/i);
    if (vsM.length === 2) {
      const dL = detectarClubesEnTexto(vsM[0]), dV = detectarClubesEnTexto(vsM[1]);
      local = dL.length ? dL[dL.length-1] : limpiarNombreLibre(vsM[0]);
      visitante = dV.length ? dV[0] : limpiarNombreLibre(vsM[1]);
    } else {
      const dets = detectarClubesEnTexto(sinHora);
      if (dets.length >= 2) { local = dets[0]; visitante = dets[1]; }
    }
    if (!local || !visitante) {
      // Línea sin partido: si trae fecha, es un encabezado de jornada → queda vigente para las siguientes
      if (fecha) fechaVigente = fecha;
      continue;
    }
    if (fecha) fechaVigente = fecha;
    filas.push({ local, visitante, fecha: fecha || fechaVigente, hora, incluir: true });
  }
  if (!filas.length) { alert('No pude detectar partidos en el texto. Formatos que entiendo:\n• ALL BOYS vs NUEVA CHICAGO 05/07 15:30\n• 05/07 — 17:10 — RIESTRA - SACACHISPAS\n• Encabezado "SÁBADO 05/07" y partidos debajo'); return; }
  fxDraft = { filas };
  render();
};
window.setFxCampo = (i, campo, v) => { if (fxDraft?.filas[i]) fxDraft.filas[i][campo] = campo === 'local' || campo === 'visitante' ? norm(v) : v; render(); };
window.setFxIncluir = (i, v) => { if (fxDraft?.filas[i]) fxDraft.filas[i].incluir = v; render(); };
window.cargarFxDetectados = async () => {
  if (!fxDraft) return;
  let ok = 0, dup = 0, inc = 0;
  const vistos = new Set(fixture.map(p => `${norm(p.local)}|${norm(p.visitante)}|${p.fecha}`));
  for (const f of fxDraft.filas) {
    if (f.incluir === false) continue;
    const L = resolverClub(f.local).club, V = resolverClub(f.visitante).club;
    if (!L || !V || !f.fecha || L === V) { inc++; continue; }
    const k = `${L}|${V}|${f.fecha}`;
    if (vistos.has(k)) { dup++; continue; }
    vistos.add(k);
    await addDoc(collection(db,'air_fixture'), {
      local: L, visitante: V, fecha: f.fecha, hora: f.hora || '', estadio: '', torneo: '',
      visitantePermitida: false, internacional: false, ts: serverTimestamp(),
    });
    ok++;
  }
  fxPegando = false; fxDraft = null;
  alert(`✅ ${ok} partido(s) cargados al fixture.${dup ? `\n⏭ ${dup} omitidos: ya estaban cargados (mismo cruce y fecha).` : ''}${inc ? `\n⚠️ ${inc} filas incompletas sin cargar (falta club o fecha).` : ''}`);
  render();
};

// TABLA DE POSICIONES (Promiedos) — contexto deportivo para el análisis
// ═══════════════════════════════════════════════════════════════════════════════
// IDs de liga en la API de ESPN (fuente verificada)
const TABLA_LIGAS = [
  { id:'arg.1', claves:['LIGA PROFESIONAL','PRIMERA DIVISION','LIGA DE PRIMERA','LPF'], label:'Liga Profesional' },
  { id:'arg.2', claves:['NACIONAL','PRIMERA NACIONAL','B NACIONAL'], label:'Primera Nacional' },
  { id:'arg.3', claves:['B METRO','PRIMERA B'], label:'Primera B Metropolitana' },
  { id:'arg.4', claves:['PRIMERA C'], label:'Primera C' },
  { id:'arg.5', claves:['PRIMERA D'], label:'Primera D' },
];
function ligaDeTorneo(torneo) {
  const t = norm(torneo || '');
  if (!t) return null;
  // orden: primero las claves más específicas (NACIONAL antes que PRIMERA B, etc.)
  for (const l of TABLA_LIGAS) if (l.claves.some(k => t.includes(k))) return l;
  return null;
}
// Promiedos abrevia nombres ("N. Chicago", "Dep. Riestra"): expandir y resolver contra la base
const ALIAS_PROMIEDOS = { 'N ':'NUEVA ', 'DEP ':'DEPORTIVO ', 'GRAL ':'GENERAL ', 'DEF ':'DEFENSORES DE ', 'ALM ':'ALMIRANTE ', 'SP ':'SPORTIVO ', 'ARG ':'ARGENTINO ', 'ATL ':'ATLETICO ', 'EST ':'ESTUDIANTES ', 'GIM ':'GIMNASIA ', 'IND ':'INDEPENDIENTE ', 'UNIV ':'UNIVERSITARIO ' };
function matchClubPromiedos(nombrePromiedos) {
  let n = norm(String(nombrePromiedos)).replace(/\./g, ' ').replace(/\s+/g, ' ').trim();
  n = (' ' + n + ' ').replace(/ ([A-Z]{1,4}) /g, (m, sig) => ALIAS_PROMIEDOS[sig + ' '] ? ' ' + ALIAS_PROMIEDOS[sig + ' '] : m).replace(/\s+/g, ' ').trim();
  const r = resolverClub(n);
  return (r.estado === 'ok' || r.estado === 'alias') ? r.club : null;
}
// Zona según la nota oficial de ESPN (Relegation, Promotion, Copa...) si existe
function zonaDeNota(nota) {
  if (!nota) return null;
  if (/releg|descen/i.test(nota)) return 'descenso';
  if (/promot|ascen|champion|libertadores|sudamericana|final|reducido|playoff|copa/i.test(nota)) return 'definicion';
  return null;
}
function zonaDePuesto(pos, total) {
  if (pos >= total - Math.max(2, Math.round(total * 0.15)) + 1) return 'descenso';
  if (pos <= Math.max(2, Math.round(total * 0.12))) return 'definicion';
  return 'media';
}
let tablaCargando = false;
window.consultarTabla = async (partidoId) => {
  const p = fixture.find(x => x.id === partidoId); if (!p) return;
  const liga = ligaDeTorneo(p.torneo);
  if (!liga) { alert('No pude asociar el torneo "' + (p.torneo || '(vacío)') + '" a una liga conocida.\nCompletá el campo Torneo del partido (ej: "Primera Nacional", "Primera C") y volvé a intentar.'); return; }
  tablaCargando = true; render();
  try {
    const r = await fetch(`/.netlify/functions/posiciones?liga=${liga.id}`, { signal: AbortSignal.timeout(15000) });
    const data = await r.json();
    if (!r.ok || !data.filas?.length) throw new Error(data.error || 'Respuesta vacía');
    const total = data.filas.length;
    const buscar = club => {
      const c = norm(club);
      const fila = data.filas.find(f => matchClubPromiedos(f.equipo) === c);
      if (!fila) return null;
      return { pos: fila.pos, pts: fila.pts, pj: fila.pj, total, zona: zonaDeNota(fila.nota) || zonaDePuesto(fila.pos, total), nombrePromiedos: fila.equipo };
    };
    const tabla = { local: buscar(p.local), visitante: buscar(p.visitante), liga: liga.label, consultado: fechaHoyLocal() };
    if (!tabla.local && !tabla.visitante) { alert(`Obtuve la tabla de ${liga.label} (${total} equipos) pero no encontré a ${p.local} ni a ${p.visitante} en ella. ¿El torneo del partido es el correcto?`); tablaCargando = false; render(); return; }

// ── IMPORTADOR DE INFORMES HISTÓRICOS (PDFs de Análisis de Riesgo anteriores) ──
// Sube los análisis de riesgo 2024–hoy y cada partido queda en el historial
// como informe finalizado: alimenta antecedentes por club y head-to-head.
let histDraft = null;      // { archivo, nroAR, fechaInforme, filas: [...] }
let histImportando = false;
let histVerLista = false;

function limpiarBoilerplateAR(texto) {
  texto = texto.replace(/El presente Documento es de uso interno[\s\S]{0,400}?NO CONTROLADA\.?/gi, ' ');
  texto = texto.replace(/P[áa]gina\s+\d+\s+de\s+\d+/gi, ' ');
  texto = texto.replace(/Formulario\s+Informe de An[áa]lisis de Riesgo\s+Divisi[óo]n Informes Preventivos/gi, ' Informe de Análisis de Riesgo ');
  return texto.replace(/\s{2,}/g, ' ').trim();
}

// Reconstruye el texto de una página respetando la posición real: agrupa por línea (Y),
// ordena por X y une caracteres sueltos (PDFs que extraen letra por letra) según el
// espacio físico entre ítems. Sin esto, el orden del texto no es confiable.
function reconstruirTextoPdf(items) {
  const its = items.filter(it => it.str !== undefined && it.str !== null)
    .map(it => ({ str: it.str, x: it.transform[4], y: it.transform[5], w: it.width || 0, h: it.height || Math.abs(it.transform[3]) || 10 }))
    .filter(it => it.str.trim() !== '');
  its.sort((a, b) => b.y - a.y || a.x - b.x);
  const lineas = [];
  let actual = null;
  for (const it of its) {
    if (!actual || Math.abs(actual.y - it.y) > Math.max(3, it.h * 0.55)) { actual = { y: it.y, items: [it] }; lineas.push(actual); }
    else actual.items.push(it);
  }
  return lineas.map(l => {
    l.items.sort((a, b) => a.x - b.x);
    let s = '', finPrev = null;
    for (const it of l.items) {
      if (finPrev !== null && (it.x - finPrev) > Math.max(0.8, it.h * 0.22)) s += ' ';
      s += it.str;
      finPrev = it.x + it.w;
    }
    return s.replace(/\s{2,}/g, ' ').trim();
  }).filter(l => l && !/^[A-ZÁÉÍÓÚÑa-záéíóúñ]$/.test(l)).join('\n');
}

function parsearAnalisisRiesgo(textoRaw) {
  // 1) Limpieza por líneas: las marcas de agua rotadas quedan como líneas de letras
  //    sueltas → se filtran SIN tocar el texto real (el método viejo borraba mayúsculas
  //    sueltas de todo el documento y destruía nombres de equipos).
  const lineas = String(textoRaw).split('\n').map(l => l.replace(/\s{2,}/g, ' ').trim()).filter(Boolean)
    .filter(l => { const t = l.split(' '); const sueltas = t.filter(x => x.length === 1).length; return !(t.length >= 4 && sueltas / t.length > 0.6); });
  const texto = limpiarBoilerplateAR(lineas.join(' ').replace(/\s{2,}/g, ' ').trim());

  const nroAR = (texto.match(/An[áa]lisis de Riesgo\s+(?:Nro\.?|N[°º]\.?|Nro)\s*:?\s*(\d+)/i) || [])[1] || '';
  const mFI = texto.match(/C\.?A\.?B\.?A\.?,?\s*(\d{1,2})\s+de\s+([a-záéíóúñ]+)\s+(?:de|del)\s+(\d{4})/i);
  let fechaInforme = '';
  if (mFI) { const mi = MESES.findIndex(m => m.toLowerCase() === mFI[2].toLowerCase()); if (mi >= 0) fechaInforme = `${mFI[3]}-${String(mi+1).padStart(2,'0')}-${String(parseInt(mFI[1])).padStart(2,'0')}`; }

  const finDoc = texto.search(/Sin otro particular/i);
  const cuerpo = finDoc > 0 ? texto.slice(0, finDoc) : texto;

  // Helpers tolerantes a los distintos formatos de la División
  const fechaDe = s => {
    let m = s.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
    if (m && +m[1] <= 31 && +m[2] <= 12) { const a = m[3].length === 2 ? '20' + m[3] : m[3]; return `${a}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`; }
    m = s.match(/(\d{1,2})\s+de\s+([a-záéíóúñ]+)\s+(?:de|del)\s+(\d{4})/i);
    if (m) { const mi = MESES.findIndex(x => x.toLowerCase() === m[2].toLowerCase()); if (mi >= 0) return `${m[3]}-${String(mi+1).padStart(2,'0')}-${String(+m[1]).padStart(2,'0')}`; }
    return '';
  };
  const horaDe = s => { const m = s.match(/(?:a las|hora[s]?)[:\s]+(\d{1,2})[:\.](\d{2})/i) || s.match(/(\d{1,2})[:\.](\d{2})\s*(?:hs\b|horas)/i); return m ? m[1].padStart(2,'0') + ':' + m[2] : ''; };
  const riesgoDe = s => { const m = s.match(/CONFLICTIVIDAD[:\s]+(ALTA|MEDIA|BAJA|ALTO|MEDIO|BAJO)/i) || s.match(/\bRIESGO[:\s]+(ALTO|MEDIO|BAJO|ALTA|MEDIA|BAJA)/i); if (!m) return ''; const t = m[1].toUpperCase(); return { ALTA:'ALTO', MEDIA:'MEDIO', BAJA:'BAJO' }[t] || t; };
  const esClub = t => { const r = resolverClub(limpiarNombreClub(t) || t); return (r.estado === 'ok' || r.estado === 'alias') ? r.club : ''; };

  // 2) Delimitación de secciones — tres estrategias en cascada:
  //    a) formato propio de la app ("Espectáculo deportivo a celebrarse")
  //    b) títulos "X vs Y" donde ambos lados resuelven a clubes de la base
  //    c) anclas "CONFLICTIVIDAD ..." (último recurso: una sección por graduación)
  let modo = 'esp';
  let marcas = [...cuerpo.matchAll(/Espect[áa]culo deportivo a celebrarse/gi)].map(m => ({ i: m.index }));
  if (!marcas.length) {
    modo = 'tit';
    const reTit = /([A-Za-zÁÉÍÓÚÑáéíóúñ][A-Za-zÁÉÍÓÚÑáéíóúñ0-9\.\(\)' ]{2,48}?)\s+[Vv][SsS]\.?\s+([A-Za-zÁÉÍÓÚÑáéíóúñ][A-Za-zÁÉÍÓÚÑáéíóúñ0-9\.\(\)' ]{2,48})/g;
    for (const m of cuerpo.matchAll(reTit)) {
      // El lado izquierdo puede arrastrar contexto previo: nos quedamos con el último
      // segmento (después de . , ; : —) y anclamos la sección donde empieza ese nombre
      const partes = m[1].split(/[,;:.•●\-–]/);
      const ultimo = partes[partes.length - 1];
      const L = esClub(ultimo), V = esClub(m[2]);
      if (L && V && L !== V) {
        const off = (m[1].length - ultimo.length) + (ultimo.length - ultimo.trimStart().length);
        marcas.push({ i: m.index + off, L, V, raw: m[0].slice(off) });
      }
    }
    marcas = marcas.filter((m, i) => i === 0 || m.i - marcas[i-1].i > 80);
  }
  if (!marcas.length) {
    modo = 'conf';
    const cs = [...cuerpo.matchAll(/CONFLICTIVIDAD[:\s]+(ALTA|MEDIA|BAJA|ALTO|MEDIO|BAJO)/gi)].map(m => m.index);
    marcas = cs.map((c, k) => ({ i: Math.max(k === 0 ? 0 : cs[k-1] + 30, c - 1400) }));
  }
  if (!marcas.length) return { nroAR, fechaInforme, filas: [] };

  const filas = [];
  marcas.forEach((m, idx) => {
    const ini = m.i;
    const fin = idx + 1 < marcas.length ? marcas[idx+1].i : cuerpo.length;
    let body = cuerpo.slice(ini, fin).trim();
    body = body.replace(/(?:Informe de An[áa]lisis de Riesgo\s*)+$/i, '').trim();
    // Formato app: la cola de la sección arrastra el encabezado repetido + el título del
    // próximo club; se recorta solo si la cola es corta (no es contenido de otra página)
    if (modo === 'esp') {
      const ms = [...body.matchAll(/Informe de An[áa]lisis de Riesgo/gi)];
      if (ms.length) { const ult = ms[ms.length-1]; if (body.length - ult.index < 220) body = body.slice(0, ult.index).trim(); }
    }
    // Formato títulos: el body arranca con el título "X vs Y", que no es parte del análisis
    if (modo === 'tit' && m.raw && body.startsWith(m.raw)) body = body.slice(m.raw.length).replace(/^[\s\-–—:•●]+/, '').trim();

    // Preámbulo hacia atrás (formato app: el título del local vive antes de la marca)
    let pre = '';
    if (modo === 'esp') {
      const preIni = idx === 0 ? 0 : marcas[idx-1].i;
      let p = cuerpo.slice(preIni, ini);
      const hs = [...p.matchAll(/Informe de An[áa]lisis de Riesgo/gi)];
      pre = (hs.length ? p.slice(hs[hs.length-1].index + hs[hs.length-1][0].length) : (p.split(/[.!?]\s+/).pop() || '')).replace(/^([A-Z]\.\s?){2,3}\s*/, '').trim();
    }

    // Iniciales del analista al final
    let iniciales = '';
    const mIni = body.match(/\s((?:[A-Z]\.\s?){2,3}[A-Z]?\.?)\s*$/);
    if (mIni && /^[A-Z\.\s]+$/.test(mIni[1])) { iniciales = mIni[1].replace(/\s+/g, ''); body = body.slice(0, mIni.index).trim(); }

    // Equipos: título VS → "frente a su par el X" + preámbulo → detección de clubes en el texto
    let local = '', visitante = '';
    if (modo === 'tit') { local = m.L; visitante = m.V; }
    if (!local || !visitante) {
      const visCrudo = (body.match(/frente a su par,?\s*(?:el la|el|la)?\s*(.{4,70}?)[\.,]/i) || [])[1] || '';
      if (!visitante && visCrudo) visitante = esClub(visCrudo) || limpiarNombreClub(visCrudo);
      if (!local && pre) local = esClub(pre) || limpiarNombreClub(pre);
    }
    if (!local || !visitante) {
      const dets = detectarClubesEnTexto((pre + ' ' + body.slice(0, 700)));
      if (!local) local = dets.find(c => c !== visitante) || '';
      if (!visitante) visitante = dets.find(c => c !== local) || '';
    }

    // Fecha y hora: primero en la zona previa a la graduación, después en todo el body
    const posConf = body.search(/CONFLICTIVIDAD/i);
    const zonaHeader = posConf > 0 ? body.slice(0, posConf + 60) : body;
    const fechaPartido = fechaDe(zonaHeader) || fechaDe(body);
    const hora = horaDe(zonaHeader) || horaDe(body);
    const riesgo = riesgoDe(body);

    // Análisis completo con párrafos: incluye el texto posterior a la graduación
    // y resalta la sección "ANÁLISIS DE SU SITUACIÓN" si existe
    let analisis = body
      .replace(/\.\s*En virtud de las razones/, '.\n\nEn virtud de las razones')
      .replace(/(CONFLICTIVIDAD[:\s]+(?:ALTA|MEDIA|BAJA|ALTO|MEDIO|BAJO)\.?)\s*/i, '$1\n\n')
      .replace(/\s*(AN[ÁA]LISIS DE (?:SU )?SITUACI[ÓO]N[:\s]*)/i, '\n\n$1\n');

    filas.push({ incluir: true, local: norm(local), visitante: norm(visitante), fechaPartido, hora, riesgo, iniciales, analisis });
  });
  return { nroAR, fechaInforme, filas };
}

window.importarInformesHistoricos = async (input) => {
  const files = [...input.files]; if (!files.length) return;
  input.value = '';
  histImportando = true; render();
  try {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const todas = [];
    let meta = { nroAR:'', fechaInforme:'', archivos: [] };
    for (const file of files) {
      const buf = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
      let texto = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const tc = await page.getTextContent();
        texto += reconstruirTextoPdf(tc.items) + '\n';
      }
      const r = parsearAnalisisRiesgo(texto);
      r.filas.forEach(f => { f.nroAR = r.nroAR; f.fechaInforme = r.fechaInforme; f.archivo = file.name; });
      todas.push(...r.filas);
      meta.archivos.push(file.name);
    }
    if (!todas.length) { alert('No se detectaron secciones de análisis en los PDF. Verificá que sean informes de Análisis de Riesgo del formato DIP.'); histImportando = false; render(); return; }
    histDraft = { filas: todas, archivos: meta.archivos };
  } catch (e) {
    alert('No se pudieron leer los PDF: ' + e.message);
    histDraft = null;
  }
  histImportando = false; render();
};

window.guardarHistoricos = async () => {
  const sel = histDraft.filas.filter(f => f.incluir);
  if (!sel.length) { alert('No hay filas seleccionadas.'); return; }
  const invalidas = sel.filter(f => !f.local || !f.visitante || !f.riesgo);
  if (invalidas.length) { alert(`Hay ${invalidas.length} fila(s) sin equipo o sin conflictividad. Completalas o desmarcalas.`); return; }
  // evitar duplicados exactos ya cargados
  let guardadas = 0, dupes = 0;
  for (const f of sel) {
    const ya = informes.some(i => i.historico && norm(i.local) === norm(f.local) && norm(i.visitante) === norm(f.visitante) && i.fechaPartido === f.fechaPartido);
    if (ya) { dupes++; continue; }
    await addDoc(collection(db,'air_informes'), {
      estado:'finalizado', historico:true,
      local: norm(f.local), visitante: norm(f.visitante),
      fechaPartido: f.fechaPartido || '', hora: f.hora || '',
      riesgo: f.riesgo, analisis: f.analisis || '', iniciales: f.iniciales || '',
      nroAR: f.nroAR || '', archivo: f.archivo || '',
      creado: serverTimestamp(),
    });
    guardadas++;
  }

  function encabezado() {

    pdf.setFont('helvetica','normal');
    pdf.text('División Informes Preventivos', cx, hy+64, { align:'center' });
    y = hy + hh + 22;
  }
  function pie() {
    const total = pdf.getNumberOfPages();
    for (let p = 1; p <= total; p++) {
      pdf.setPage(p);
      pdf.setFont('helvetica','normal'); pdf.setFontSize(9); pdf.setTextColor(60);
      pdf.text(`Página ${p} de ${total}`, PW-MR, 795, { align:'right' });
      pdf.setFont('helvetica','bolditalic'); pdf.setFontSize(6.3); pdf.setTextColor(70);
      const disc = 'El presente Documento es de uso interno de la División Informes Preventivos – Departamento Seguridad en Eventos Deportivos - Dirección Prevención en Eventos Masivos – Superintendencia de Operaciones - Policía de la Ciudad - Ministerio de Seguridad. Cualquier copia impresa se considera copia NO CONTROLADA.';
      pdf.text(pdf.splitTextToSize(disc, MW), ML, 806);
      pdf.setTextColor(0);
    }
  }
  function saltoSi(alto) { if (y + alto > 770) { pdf.addPage(); encabezado(); } }
  function parrafo(texto, opts = {}) {
    const size = opts.size || 11, lh = size * 1.55;
    pdf.setFont('helvetica', opts.estilo || 'normal'); pdf.setFontSize(size);
    const sangria = opts.sangria ? 28 : 0;
    const lineas = pdf.splitTextToSize(texto, MW - sangria);
    lineas.forEach((ln, i) => {
      saltoSi(lh);
      pdf.text(ln, opts.centrado ? PW/2 : ML + (i === 0 ? sangria : 0), y, opts.centrado ? { align:'center' } : undefined);
      y += lh;
    });
    y += opts.despues ?? 6;
  }
  // Tokeniza texto con marcas **negrita** y __subrayado__ en palabras con estilo
  function tokenizarMarcas(texto) {
    const toks = []; let b = false, u = false, buf = '';
    const push = () => { if (buf.trim()) buf.split(/\s+/).filter(Boolean).forEach(w => toks.push({ w, b, u })); buf = ''; };
    for (let i = 0; i < texto.length;) {
      if (texto.startsWith('**', i)) { push(); b = !b; i += 2; }
      else if (texto.startsWith('__', i)) { push(); u = !u; i += 2; }
      else { buf += texto[i]; i++; }
    }
    push();
    return toks;
  }
  // Párrafo JUSTIFICADO con soporte de negrita y subrayado palabra por palabra
  function parrafoRico(texto, opts = {}) {
    const size = opts.size || 11, lh = size * 1.55;
    pdf.setFontSize(size);
    const fuente = t => opts.estilo === 'italic' ? (t.b ? 'bolditalic' : 'italic') : (t.b ? 'bold' : 'normal');
    const toks = tokenizarMarcas(texto);
    if (!toks.length) { y += opts.despues ?? 6; return; }
    const sangria = opts.sangria ? 28 : 0;
    pdf.setFont('helvetica', 'normal');
    const esp = pdf.getTextWidth(' ');
    // Armar líneas midiendo cada palabra con su fuente real
    const lineas = []; let lin = [], ancho = 0, maxW = MW - sangria;
    toks.forEach(t => {
      pdf.setFont('helvetica', fuente(t));
      const w = pdf.getTextWidth(t.w);
      if (lin.length && ancho + esp + w > maxW) { lineas.push({ toks: lin, ancho, maxW }); lin = []; ancho = 0; maxW = MW; }
      ancho += (lin.length ? esp : 0) + w; lin.push({ ...t, ww: w });
    });
    if (lin.length) lineas.push({ toks: lin, ancho, maxW, ultima: true });
    // Dibujar: justificado repartiendo el sobrante entre espacios (menos la última línea)
    lineas.forEach((L, li) => {
      saltoSi(lh);
      const gaps = L.toks.length - 1;
      const justificar = opts.justificado !== false && !L.ultima && gaps > 0;
      const espL = justificar ? esp + (L.maxW - L.ancho) / gaps : esp;
      let x = ML + (li === 0 ? sangria : 0);
      L.toks.forEach(t => {
        pdf.setFont('helvetica', fuente(t));
        pdf.text(t.w, x, y);
        if (t.u) { pdf.setLineWidth(0.7); pdf.setDrawColor(0); pdf.line(x, y + 1.6, x + t.ww, y + 1.6); }
        x += t.ww + espL;
      });
      y += lh;
    });
    y += opts.despues ?? 6;
  }
  // Recuadro coloreado según nivel para el párrafo de graduación de conflictividad
  function recuadroConflictividad(texto, nivel) {
    const size = 11.5, lh = size * 1.5, pad = 12;
    const cfg = {
      ALTO:  { borde:[220,38,38],  fondo:[254,226,226] },
      MEDIO: { borde:[202,138,4],  fondo:[254,249,195] },
      BAJO:  { borde:[22,163,74],  fondo:[220,252,231] },
    }[nivel] || { borde:[107,114,128], fondo:[243,244,246] };
    pdf.setFontSize(size);
    const nivelTxt = NIVEL_TXT[nivel] || '';
    const toks = sinMarcas(texto).split(/\s+/).filter(Boolean)
      .map(w => ({ w, b: /^CONFLICTIVIDAD:?$/i.test(w) || /^(ALTA|MEDIA|BAJA)[\.,;:]?$/i.test(w) }));
    const maxW = MW - pad * 2;
    pdf.setFont('helvetica', 'normal');
    const esp = pdf.getTextWidth(' ');
    const lineas = []; let lin = [], ancho = 0;
    toks.forEach(t => {
      pdf.setFont('helvetica', t.b ? 'bold' : 'normal');
      const w = pdf.getTextWidth(t.w);
      if (lin.length && ancho + esp + w > maxW) { lineas.push({ toks: lin, ancho }); lin = []; ancho = 0; }
      ancho += (lin.length ? esp : 0) + w; lin.push({ ...t, ww: w });
    });
    if (lin.length) lineas.push({ toks: lin, ancho, ultima: true });
    const altoBox = pad * 2 + (lineas.length - 1) * lh + size;
    saltoSi(altoBox + 14);
    const top = y - size + 3;
    pdf.setDrawColor(cfg.borde[0], cfg.borde[1], cfg.borde[2]);
    pdf.setFillColor(cfg.fondo[0], cfg.fondo[1], cfg.fondo[2]);
    pdf.setLineWidth(1.6);
    pdf.roundedRect(ML, top, MW, altoBox, 6, 6, 'FD');
    let by = top + pad + size * 0.78;
    lineas.forEach(L => {
      const gaps = L.toks.length - 1;
      const espL = (!L.ultima && gaps > 0) ? esp + (maxW - L.ancho) / gaps : esp;
      let x = ML + pad;
      L.toks.forEach(t => { pdf.setFont('helvetica', t.b ? 'bold' : 'normal'); pdf.setTextColor(0); pdf.text(t.w, x, by); x += t.ww + espL; });
      by += lh;
    });
    pdf.setDrawColor(0); pdf.setLineWidth(0.8);
    y = top + altoBox + 18;
  }

  encabezado();
  const hoy = new Date();
  pdf.setFont('helvetica','bold'); pdf.setFontSize(11);
  pdf.text(`Análisis de Riesgo Nro. ${nro}`, PW-MR, y, { align:'right' }); y += 15;

  parrafo('Sin otro particular, saludo a Uds. muy atte.', { sangria:true, despues:26 });

  // Bloque de firma EN LA PRIMERA HOJA: casillero de iniciales + firmante
  saltoSi(110);
  const inis = [...new Set(fins.map(i => (i.iniciales||'').toUpperCase().trim()).filter(Boolean))];
  if (inis.length) {
    const bx = ML + 14, bw = 62, bh = 26;
    pdf.setLineWidth(0.9);
    inis.slice(0,5).forEach((ii, k) => {
      pdf.rect(bx, y + k*bh, bw, bh);
      pdf.setFont('helvetica','bold'); pdf.setFontSize(11);
      pdf.text(ii, bx + 6, y + k*bh + 17);
    });
    pdf.rect(bx, y + Math.min(inis.length,5)*bh, bw, bh);
  }
  pdf.setFont('helvetica','bold'); pdf.setFontSize(11);
  pdf.text(firmante, PW - MR - 30, y + 40, { align:'right' });
  pdf.setFont('helvetica','normal');
  pdf.text(cargo, PW - MR - 30, y + 54, { align:'right' });

  // ═══ ANEXO: los análisis por encuentro arrancan en la segunda hoja ═══
  pdf.addPage(); encabezado();
  y += 2;
  pdf.setFont('helvetica','bold'); pdf.setFontSize(13);
  const tituloAnexo = 'ANEXO — ANÁLISIS POR ENCUENTRO';
  pdf.text(tituloAnexo, PW/2, y, { align:'center' });
  const twA = pdf.getTextWidth(tituloAnexo);
  pdf.setLineWidth(0.9); pdf.line(PW/2 - twA/2, y + 2.5, PW/2 + twA/2, y + 2.5);
  y += 30;

  fins.forEach(inf => {
    saltoSi(140);
    y += 10;
    const titulo = `Club ${inf.local}`;
    pdf.setFont('helvetica','bold'); pdf.setFontSize(13.5);
    pdf.text(titulo, PW/2, y, { align:'center' });
    const tw = pdf.getTextWidth(titulo);
    pdf.setLineWidth(0.9); pdf.line(PW/2 - tw/2, y+2.5, PW/2 + tw/2, y+2.5);

    const parrafos = (inf.analisis || '').split(/\n\s*\n/).map(s => s.replace(/\n/g,' ').trim()).filter(Boolean);
    parrafos.forEach((px, i) => {
      if (/CONFLICTIVIDAD\s*:?\s*(ALTA|MEDIA|BAJA)/i.test(sinMarcas(px))) {
        const nv = inf.riesgo || { ALTA:'ALTO', MEDIA:'MEDIO', BAJA:'BAJO' }[(sinMarcas(px).match(/CONFLICTIVIDAD\s*:?\s*(ALTA|MEDIA|BAJA)/i)||[])[1]?.toUpperCase()] || '';
        recuadroConflictividad(px, nv);

    if (inf.iniciales) parrafo(inf.iniciales.toUpperCase(), { estilo:'bold', despues:4 });

};

// ── Evolución de riesgo por club: sparkline SVG con los últimos 10 informes ──
function sparklineRiesgoHtml(hist) {
  const NIVEL_VAL = { BAJO:1, MEDIO:2, ALTO:3 };
  const COL = { BAJO:'#16a34a', MEDIO:'#eab308', ALTO:'#dc2626' };
  const pts = hist.filter(i => i.riesgo && NIVEL_VAL[i.riesgo])
    .sort((a,b) => (a.fechaPartido||'').localeCompare(b.fechaPartido||''))
    .slice(-10);
  if (pts.length < 2) return '';
  const W = 640, H = 88, PADX = 34, PADY = 16;
  const x = i => PADX + i * (W - PADX*2) / (pts.length - 1);
  const y = v => H - PADY - (v - 1) * (H - PADY*2) / 2;
  const poly = pts.map((p, i) => `${x(i).toFixed(1)},${y(NIVEL_VAL[p.riesgo]).toFixed(1)}`).join(' ');
  const ult = pts[pts.length-1], primero = pts[0];
  const tendencia = NIVEL_VAL[ult.riesgo] - NIVEL_VAL[primero.riesgo];
  return `<div class="fc">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:4px">
      <div class="sec-label" style="margin:0">📈 Evolución de la conflictividad (últimos ${pts.length} informes)</div>
      <span style="font-size:11px;font-weight:700;color:${tendencia>0?'#dc2626':tendencia<0?'#16a34a':'#6b7280'}">${tendencia>0?'▲ en escalada':tendencia<0?'▼ en descenso':'▬ estable'}</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
      ${[['ALTO',3],['MEDIO',2],['BAJO',1]].map(([r,v]) => `<line x1="${PADX}" y1="${y(v)}" x2="${W-PADX}" y2="${y(v)}" stroke="#f3f4f6" stroke-width="1"/><text x="4" y="${y(v)+3.5}" font-size="9" font-weight="700" fill="${COL[r]}">${r}</text>`).join('')}
      <polyline points="${poly}" fill="none" stroke="#0C447C" stroke-width="2" stroke-linejoin="round"/>
      ${pts.map((p, i) => `<circle cx="${x(i)}" cy="${y(NIVEL_VAL[p.riesgo])}" r="4.5" fill="${COL[p.riesgo]}" stroke="#fff" stroke-width="1.5"><title>${esc(p.local)} vs ${esc(p.visitante)} — ${fmt(p.fechaPartido)} — ${p.riesgo}</title></circle>`).join('')}
      <text x="${x(0)}" y="${H-2}" font-size="8.5" fill="#9ca3af" text-anchor="middle">${fmt(primero.fechaPartido)}</text>
      <text x="${x(pts.length-1)}" y="${H-2}" font-size="8.5" fill="#9ca3af" text-anchor="middle">${fmt(ult.fechaPartido)}</text>
    </svg>
  </div>`;
}

        </div>`;

      <div class="sec-label" style="margin:16px 0 8px">📚 Historial de informes de riesgo (${hist.length})</div>

  }

  // Listado de equipos con actividad
  const conteo = {};
  informes.forEach(i => [i.local, i.visitante].forEach(c => {
    if (!c) return; const n = norm(c);
    conteo[n] = conteo[n] || { total:0, ALTO:0, MEDIO:0, BAJO:0 };
    conteo[n].total++; if (i.riesgo) conteo[n][i.riesgo]++;
  }));
  Object.keys(equiposExtra).forEach(c => { conteo[c] = conteo[c] || { total:0, ALTO:0, MEDIO:0, BAJO:0 }; });

  const activos = Object.keys(conteo).sort((a,b) => conteo[b].ALTO - conteo[a].ALTO || conteo[b].total - conteo[a].total);
  const activosHtml = activos.length ? activos.map(c => {

          <div style="font-size:13.5px;font-weight:700">${c} ${e.interna?'<span class="persona-tag" style="background:#fee2e2;color:#7f1d1d;border:1px solid #fca5a5">🔺 interna</span>':''} ${e.incidentesRecientes?'<span class="persona-tag" style="background:#fef3c7;color:#92400e;border:1px solid #fcd34d">🚨 incidentes</span>':''}</div>

          ${k.MEDIO?`<span class="bdg bdg-outline-MEDIO">${k.MEDIO} MEDIO</span>`:''}
          ${k.BAJO?`<span class="bdg bdg-outline-BAJO">${k.BAJO} BAJO</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('') : `<div class="empty">Todavía no hay equipos con informes. A medida que finalices informes (o cuando cargues el historial de 2 años), acá se arma el perfil de conflictividad de cada club.</div>`;

  return `
    <div class="fc">
      <div class="sec-label" style="margin-bottom:6px">🔎 Abrir perfil de cualquier equipo</div>

}

// TAB RIVALIDADES — Consulta de relación entre dos clubes

window.setRivA = v => { st.rivA = v; render(); };
window.setRivB = v => { st.rivB = v; render(); };

let rivEdit = false;
const NIVELES_EDIT = [
  ['max','⚔️ Rivalidad máxima (clásico)'],
  ['enem','🔥 Enemistad'],
  ['conf','⚠️ Conflicto'],
  ['tens','🟡 Tensión'],
  ['resp','🤝 Respeto / buena relación'],
  ['ali','🔗 Alianza / amistad entre barras'],
  ['ninguna','⬜ Sin relación'],
];
window.toggleRivEdit = () => { rivEdit = !rivEdit; render(); };
window.guardarRivalidad = async () => {
  const A = norm(st.rivA), B = norm(st.rivB);
  if (!A || !B || A === B) { alert('Seleccioná dos clubes distintos.'); return; }
  const nivel = document.getElementById('riv-nivel').value;
  const resena = document.getElementById('riv-resena').value.trim();
  await setDoc(doc(db,'air_rivalidades', rivKey(A, B)), { a: A, b: B, nivel, resena, actualizado: serverTimestamp(), por: currentUser?.id || '' });
  rivEdit = false; render();
};
window.eliminarRivalidad = async () => {
  const A = norm(st.rivA), B = norm(st.rivB);
  const cust = getCustomRel(A, B);
  if (!cust) return;
  if (!confirm('¿Quitar el registro personalizado y volver a la base del sistema?')) return;
  await deleteDoc(doc(db,'air_rivalidades', cust.id));
  rivEdit = false; render();
};

function renderTabRivalidades() {
  const A = norm(st.rivA), B = norm(st.rivB);
  let resultado = '';
  if (A && B && A !== B) {
    const cust = getCustomRel(A, B);
    const rel = getRelacion(A, B);
    const esAli = cust?.nivel === 'ali' || getAlianzas(A).map(norm).includes(B);
    const nv = rel ? NIVELES_REL[rel] : null;
    const sug = sugerirRiesgo(A, B, {});
    const resena = getResena(A, B);
    const cruces = [];
    getAlianzas(A).forEach(ali => { if (esRival(ali,B)) cruces.push(`Barra de <b>${A}</b> aliada de <b>${norm(ali)}</b> → rival de <b>${B}</b>`); });
    getAlianzas(B).forEach(ali => { if (esRival(ali,A)) cruces.push(`Barra de <b>${B}</b> aliada de <b>${norm(ali)}</b> → rival de <b>${A}</b>`); });

    // Historial operativo entre ambos: partes U.C.O. + informes finalizados de este emparejamiento
    const h2hP = partes.filter(pa => { const x = norm(pa.local), y = norm(pa.visitante); return (x===A&&y===B)||(x===B&&y===A); })
      .sort((x,y) => (y.fecha||'').localeCompare(x.fecha||''));
    const h2hI = informes.filter(i => { if (i.estado!=='finalizado') return false; const x = norm(i.local), y = norm(i.visitante); return (x===A&&y===B)||(x===B&&y===A); })
      .sort((x,y) => (y.fechaPartido||'').localeCompare(x.fechaPartido||''));

    const histHtml = (h2hP.length || h2hI.length) ? `
      <div style="margin-top:14px;text-align:left">
        <div class="sec-label">📚 Historial operativo entre ambos</div>
        ${h2hP.map(pa => `<div class="factor ${pa.gravedad==='sin'?'neg':'pos'}" style="font-size:12px">${GRAVEDADES[pa.gravedad]?.label || pa.gravedad} — ${fmt(pa.fecha)}${pa.nro ? ' · Informe U.C.O. Nro. '+esc(pa.nro) : ''}${pa.detalle && pa.gravedad!=='sin' ? '<br><span style="color:#6b7280">'+esc(pa.detalle.slice(0,180))+(pa.detalle.length>180?'…':'')+'</span>' : ''}</div>`).join('')}
        ${h2hI.map(i => `<div class="factor info" style="font-size:12px">📋 Análisis de riesgo previo: <b>CONFLICTIVIDAD ${i.riesgo}</b> — ${fmt(i.fechaPartido)}</div>`).join('')}
      </div>` : '';

    const editHtml = rivEdit ? `
      <div style="margin-top:14px;padding:14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;text-align:left">
        <div class="sec-label">✏️ Registrar relación e historial — ${A} vs ${B}</div>
        <div class="fr fr1" style="margin-top:6px">
          <div><div class="sec-label">Nivel de relación</div>
            <select id="riv-nivel">${NIVELES_EDIT.map(([k,l]) => `<option value="${k}" ${((cust?.nivel) || rel || (esAli?'ali':'ninguna')) === k ? 'selected' : ''}>${l}</option>`).join('')}</select>
          </div>
        </div>
        <div class="sec-label">Reseña del historial (peleas, hechos, años, contexto — se muestra en el análisis)</div>
        <textarea id="riv-resena" style="min-height:100px" placeholder="Ej: Clásico del ascenso. Enfrentamientos entre facciones en los años 2005/2006 en Floresta e Isidro Casanova; última pelea registrada en la vía pública en...">${esc(cust?.resena || '')}</textarea>
        <div class="btns-row" style="margin-top:10px">
          <button class="btn-main" style="flex:none;padding:9px 18px" onclick="guardarRivalidad()">💾 Guardar</button>
          ${cust ? `<button class="btn-mini" style="padding:9px 14px;color:#b91c1c;border-color:#fca5a5" onclick="eliminarRivalidad()">🗑 Volver a la base</button>` : ''}
          <button class="btn-mini" style="padding:9px 14px" onclick="toggleRivEdit()">Cancelar</button>
        </div>
      </div>` : '';

    resultado = `
      <div class="fc" style="text-align:center">
        <div style="font-size:15px;font-weight:700;margin-bottom:10px">${A} <span style="color:#9ca3af">vs</span> ${B}</div>
        <span class="rel-badge" style="background:${nv?nv.color:(esAli?'#0284c7':'#9ca3af')}">${nv ? nv.label : (esAli ? 'ALIANZA / AMISTAD' : 'SIN RELACIÓN DIRECTA REGISTRADA')}</span>
        ${cust ? '<div style="font-size:10.5px;color:#0284c7;margin-top:4px">✏️ Relación cargada por el área (pisa la base del sistema)</div>' : ''}
        ${nv ? `<div style="font-size:12px;color:#6b7280;margin-top:8px">${nv.desc}</div>` : ''}
        ${resena ? `<div style="margin-top:10px;text-align:left;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:12.5px;color:#374151"><b>📖 Historial:</b> ${esc(resena)}</div>` : ''}
        ${cruces.length ? `<div style="margin-top:12px;text-align:left">${cruces.map(c=>`<div class="factor pos">🔗 ${c}</div>`).join('')}</div>` : ''}
        ${histHtml}
        <div style="margin-top:12px;font-size:12px;color:#374151">Sugerencia base del sistema para este cruce: <span class="bdg bdg-${sug.riesgo}">${sug.riesgo}</span> <span style="color:#9ca3af">(sin datos del encuentro)</span></div>
        <div style="margin-top:10px"><button class="btn-mini" onclick="toggleRivEdit()">${cust ? '✏️ Editar relación / historial' : '➕ Registrar relación / historial'}</button></div>
        ${editHtml}
      </div>`;
  }
  const fichas = [A, B].filter(Boolean).map(c => {
    const r = RIV[c]; if (!r) return `<div class="fc"><b>${c}</b><div style="font-size:12px;color:#9ca3af;margin-top:4px">Sin datos cargados en la base. Podés registrar relaciones con el botón de arriba.</div></div>`;
    const pill = (arr, color, bg) => arr.map(x=>`<span class="club-pill" style="border-color:${color};color:${color};background:${bg}">${x}</span>`).join('') || '<span style="font-size:11px;color:#9ca3af">—</span>';
    return `<div class="fc">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px">${c}</div>
      <div class="sec-label">Rivalidad máxima</div><div style="margin-bottom:8px">${pill(r.max,'#dc2626','#fef2f2')}</div>
      <div class="sec-label">Enemistad</div><div style="margin-bottom:8px">${pill(r.enem,'#ea580c','#fff7ed')}</div>
      <div class="sec-label">Conflicto</div><div style="margin-bottom:8px">${pill(r.conf,'#d97706','#fffbeb')}</div>
      <div class="sec-label">Tensión</div><div style="margin-bottom:8px">${pill(r.tens,'#65a30d','#f7fee7')}</div>
      <div class="sec-label">Respeto / buena relación</div><div style="margin-bottom:8px">${pill(r.resp,'#0284c7','#f0f9ff')}</div>
      <div class="sec-label">Alianzas / amistades</div><div>${pill(r.ali,'#0284c7','#eff6ff')}</div>
    </div>`;
  }).join('');

  return `
    <div class="fc">
      <div class="sec-label" style="margin-bottom:8px">⚔️ Consultar relación entre dos parcialidades</div>
      <div class="fr fr2">
        <div><div class="sec-label">Club A</div><input list="dl-clubes3" value="${esc(st.rivA)}" onchange="setRivA(this.value)" placeholder="Ej: ALL BOYS"></div>
        <div><div class="sec-label">Club B</div><input list="dl-clubes3" value="${esc(st.rivB)}" onchange="setRivB(this.value)" placeholder="Ej: ALMIRANTE BROWN"></div>
      </div>
      <datalist id="dl-clubes3">${CLUBES.map(c=>`<option value="${c}">`).join('')}</datalist>
      <div style="font-size:11px;color:#9ca3af">Base: mapa de rivalidades entre barras + alianzas. Con el botón "Registrar relación / historial" podés corregir un nivel o sumar la reseña de peleas y hechos entre dos parcialidades: pisa la base y el motor la usa en el análisis.</div>
    </div>
    ${resultado}
    ${fichas}`;
}

const clubParaBusqueda = c => (c || '').replace(/\s*\([^)]*\)\s*/g, ' ').replace(/\s+/g, ' ').trim();

async function fetchFeedXml(url, tipo) {
  const proxied = `/.netlify/functions/rss-proxy?url=${encodeURIComponent(url)}`;
  const intentos = [proxied, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
  for (const u of intentos) {
    try {
      const r = await fetch(u, { signal: AbortSignal.timeout(12000) });
      if (!r.ok) continue;
      return await r.text();
    } catch(e) {}
  }
  return null;
}
function extraerTag(block, tag){ const m = block.match(new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`,'i')); return m ? m[1].replace(/<!\[CDATA\[|\]\]>/g,'').trim() : ''; }
// Los feeds traen HTML escapado dentro del XML (&lt;a href=...&gt;): primero se
// decodifican las entidades y recién después se quitan los tags.
function limpiarHtml(s) {
  let t = s || '';
  for (let i = 0; i < 2; i++) t = t.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#0?39;|&apos;/g,"'").replace(/&nbsp;/g,' ').replace(/&amp;/g,'&');
  return t.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
}
function parseItems(xml, fuente, esAtom) {
  const items = []; if (!xml) return items;
  const rx = esAtom ? /<entry>([\s\S]*?)<\/entry>/g : /<item>([\s\S]*?)<\/item>/g;
  let m;
  while ((m = rx.exec(xml)) !== null) {
    const b = m[1];
    let link = '';
    if (esAtom) { const lm = b.match(/<link[^>]*href="([^"]+)"/i); link = lm ? lm[1] : extraerTag(b,'id'); }
    else link = extraerTag(b,'link') || extraerTag(b,'guid');
    link = (link || '').replace(/&amp;/g,'&').trim();
    const titulo = limpiarHtml(extraerTag(b,'title'));
    const fecha = extraerTag(b, esAtom?'updated':'pubDate') || extraerTag(b,'published');
    let desc = limpiarHtml(extraerTag(b,'description') || extraerTag(b,'content') || extraerTag(b,'summary')).slice(0,220);
    // Google News repite el título como descripción-link: si no aporta nada, se omite
    if (desc) {
      const dl = desc.toLowerCase(), tl = titulo.toLowerCase();
      if (dl.includes('news.google') || dl.startsWith(tl.slice(0,50)) || tl.startsWith(dl.slice(0,50))) desc = '';
    }
    if (titulo) items.push({ titulo, link, fecha, desc, fuente });
  }
  return items.slice(0, 25);
}

window.buscarNoticias = async (q) => {
  q = (q ?? document.getElementById('not-q')?.value ?? '').trim();
  if (!q) { alert('Escribí qué querés buscar.'); return; }
  notQuery = q; notCargando = true; notResultados = []; render();
  // El filtro de período se aplica solo a las consultas de Google News (when:Xd)
  if (notPeriodo !== 'todo') q = `${q} when:${notPeriodo}`;
  // Una sola búsqueda dispara consultas paralelas en varios medios y fuentes:
  const fuentes = [
    { f:'Google News',  url: googleNewsUrl(q), atom:false },
    { f:'Olé',          url: googleNewsUrl(`site:ole.com.ar ${q}`), atom:false },
    { f:'Infobae',      url: googleNewsUrl(`site:infobae.com ${q}`), atom:false },
    { f:'TyC Sports',   url: googleNewsUrl(`site:tycsports.com ${q}`), atom:false },
    { f:'Clarín',       url: googleNewsUrl(`site:clarin.com ${q}`), atom:false },
    { f:'La Nación',    url: googleNewsUrl(`site:lanacion.com.ar ${q}`), atom:false },
    { f:'Doble Amarilla', url: googleNewsUrl(`site:dobleamarilla.com.ar ${q}`), atom:false },
    { f:'Reddit r/Argentina', url: redditSearchUrl('Argentina', q), atom:true },
    { f:'Reddit r/futbol',    url: redditSearchUrl('futbol', q), atom:true },
  ];
  const res = await Promise.allSettled(fuentes.map(async s => parseItems(await fetchFeedXml(s.url), s.f, s.atom)));
  const vistos = new Set(); const todos = [];
  res.forEach(r => { if (r.status === 'fulfilled') r.value.forEach(n => {
    const k = n.titulo.toLowerCase().slice(0,80);
    if (!vistos.has(k)) { vistos.add(k); todos.push(n); }
  });});
  const ahora = Date.now();
  todos.forEach(n => {
    n.t = new Date(n.fecha).getTime() || 0;
    n.alta = KEYWORDS_DURAS.some(k => (n.titulo+' '+n.desc).toLowerCase().includes(k));
    // Puntaje: relevancia + recencia, para que una noticia fresca del encuentro
    // no quede sepultada por incidentes de hace años
    const dias = n.t ? (ahora - n.t) / 864e5 : 9999;
    n.score = (n.alta ? 2 : 0) + (dias <= 7 ? 3 : dias <= 31 ? 2 : dias <= 183 ? 1 : 0);
  });
  todos.sort((a,b) => (b.score - a.score) || (b.t - a.t));
  notResultados = todos; notCargando = false; render();
};

window.guardarAntecedenteNoticia = async idx => {
  const n = notResultados[idx]; if (!n) return;
  if (antecedentes.some(a => a.link === n.link)) { alert('Esta noticia ya está guardada como antecedente.'); return; }
  // Sugerencia de club: buscar nombres de la base en el título
  const tNorm = norm(n.titulo + ' ' + (n.desc || ''));
  const sugerido = CLUBES.find(c => tNorm.includes(c)) || CLUBES.find(c => c.split(' ').some(w => w.length > 4 && tNorm.includes(w))) || '';
  const club = prompt('¿A qué club se vincula este antecedente?', sugerido);
  if (club === null) return;
  const clubN = norm(club);
  if (!clubN) { alert('Indicá un club.'); return; }
  const grav = prompt('Gravedad del antecedente: escribí G (grave) o M (menor)', 'M');
  if (grav === null) return;
  const gravedad = grav.trim().toUpperCase().startsWith('G') ? 'grave' : 'menor';
  const fecha = n.t ? new Date(n.t).toISOString().slice(0,10) : fechaHoyLocal();
  await addDoc(collection(db,'air_antecedentes'), {
    club: clubN, fecha, gravedad,
    titulo: n.titulo || '', link: n.link || '', fuente: n.fuente || 'noticia',
    estado: 'validado', ts: serverTimestamp(),
  });
};

window.importarExcelR = (input) => {
  const file = input.files[0]; if (!file) return;
  const cargar = () => {
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:'' });
        const buscar = (row, claves) => { for (const k of Object.keys(row)) { const kn = norm(k); if (claves.some(c => kn.includes(c))) return String(row[k]).trim(); } return ''; };
        const existentes = new Set(radicalizados.map(r => r.dni || norm(r.nombre)));
        let nuevos = 0;
        for (const row of rows) {
          const nombre = buscar(row, ['NOMBRE','APELLIDO']); if (!nombre) continue;
          const dni = buscar(row, ['DNI','DOCUMENTO']);
          if (existentes.has(dni || norm(nombre))) continue;
          await addDoc(collection(db,'radicalizados_copa'), {
            nombre: nombre.toUpperCase(), dni,
            club: buscar(row,['CLUB','BARRA','FACCION']).toUpperCase(),
            resolucion: buscar(row,['RESOL','EXPEDIENTE']),
            motivo: buscar(row,['MOTIVO']),
            obs: buscar(row,['OBS','APODO','ALIAS']),
            admision: /si|1|x/i.test(buscar(row,['ADMISION'])) ? 'SI':'NO',
            captura: /si|1|x/i.test(buscar(row,['CAPTURA'])) ? 'SI':'NO',
            ts: serverTimestamp()
          });
          existentes.add(dni || norm(nombre)); nuevos++;
        }
        alert(`✅ Importación finalizada: ${nuevos} personas nuevas (duplicados omitidos).`);
      } catch(err) { alert('Error al leer el archivo: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  };
  if (typeof XLSX === 'undefined') { const s = document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'; s.onload = cargar; document.head.appendChild(s); }
  else cargar();
  input.value = '';
};
