let parteDraft = null;       // formulario en edición
let parteImportando = false;
let parteExpandido = null;

const GRAVEDADES = {
  sin:   { label:'🟢 Sin novedades',      bg:'#dcfce7', fg:'#166534' },
  menor: { label:'🟡 Incidentes menores', bg:'#fef9c3', fg:'#854d0e' },
  grave: { label:'🔴 Incidentes graves',  bg:'#fee2e2', fg:'#991b1b' },
};

function limpiarNombreClub(s) {
  let t = (s || '').replace(/club\s+atl[ée]tico|club\s+deportivo\s+y\s+social|club\s+deportivo|club\s+atl\.?|f[úu]tbol\s+club|club/gi, ' ').trim();
  t = norm(t);
  t = t.replace(/\bGRAL\.?\s/g, 'GENERAL ').replace(/\bDEP\.?\s/g, 'DEPORTIVO ').replace(/\bDEF\.?\s/g, 'DEFENSORES ');
  t = t.replace(/\b[A-ZÑ]\b/g, ' ').replace(/\s{2,}/g, ' ').trim().replace(/\.$/, '').trim();
  if (!t) return '';
  // Intento de match contra la base de clubes
  if (RIV[t]) return t;
  const cand = CLUBES.find(c => c.includes(t) || t.includes(c));
  return cand || t;
}

window.importarPartePDF = async (input) => {
  const file = input.files[0]; if (!file) return;
  input.value = '';
  parteImportando = true; render();
  try {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buf = await file.arrayBuffer();
    const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
    let texto = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      texto += tc.items.map(it => it.str).join(' ') + '\n';
    }
    texto = texto.replace(/\s+/g, ' ').trim();
    // ── Limpieza de interferencia de la marca de agua diagonal del formulario ──
    // a) letra MAYÚSCULA intercalada dentro de una palabra en minúsculas ("noveMdades" → "novedades")
    texto = texto.replace(/([a-záéíóúñ])[A-ZÁÉÍÓÚÑ](?=[a-záéíóúñ])/g, '$1');
    // b) letras mayúsculas sueltas entre espacios ("S S O O Estadio" → "Estadio")
    for (let k = 0; k < 3; k++) texto = texto.replace(/(^|\s)[A-ZÁÉÍÓÚÑ](?=\s)/g, '$1').replace(/\s{2,}/g, ' ');

    // ── Parseo de campos del Informe U.C.O. ──
    const nro = (texto.match(/Informe\s+U\.?C\.?O\.?\s+Nro\.?\s*(\d+)/i) || [])[1] || '';
    const mFecha = texto.match(/Fecha del encuentro[^:]{0,40}:\s*(?:[a-záéíóúñA-ZÁÉÍÓÚÑ]+\s+)?(\d{1,2})\s+de\s+([a-záéíóúñA-ZÁÉÍÓÚÑ]+(?:\s+[a-záéíóúñ]+)?)\s+del?\s+(\d{4})/i);
    let fecha = '';
    if (mFecha) {
      const mesTxt = mFecha[2].replace(/\s+/g, '').toLowerCase();
      const mesIdx = MESES.findIndex(m => m.toLowerCase() === mesTxt);
      if (mesIdx >= 0) fecha = `${mFecha[3]}-${String(mesIdx+1).padStart(2,'0')}-${String(parseInt(mFecha[1])).padStart(2,'0')}`;
    }
    const estadio = ((texto.match(/Estadio\s*:\s*["\u201c\u201d]?([^"\u201c\u201d]{3,60}?)["\u201c\u201d]?\s*\.?\s*(?:Inicio|Implantaci)/i) || [])[1] || '').trim().replace(/\.$/, '');
    let local = '', visitante = '';
    const mVs = texto.match(/Novedades\s+U\.?C\.?O\.?\s+(.{4,70}?)\s+vs\.?\s+(.{4,70}?)\s+(?:\(|Fecha del encuentro)/i)
             || texto.match(/(.{4,70}?)\s+vs\.?\s+(.{4,70}?)\s+Fecha del encuentro/i);
    if (mVs) { local = limpiarNombreClub(mVs[1]); visitante = limpiarNombreClub(mVs[2]); }
    const sinNov = /sin\s+novedades/i.test(texto);
    let detalle = '';
    const mDet = texto.match(/Novedades\s*:\s*(?:●\s*)?([\s\S]+?)(?:Es todo cuanto|$)/i);
    if (mDet) detalle = mDet[1].replace(/●/g, '\n•').trim().slice(0, 2000);
    if (sinNov) detalle = 'El evento se desarrolló sin novedades que hacer constar desde la sala U.C.O.';
    const kwGrave = /(\bherid\w*|batalla campal|avalancha|\barmas?\b|arma\s+de\s+fuego|apuñal\w*|balacera|tiroteo|enfrentamiento|\bdetenid\w*|lesionad\w*|agresi[oó]n f[ií]sica)/i.test(texto);
    const gravedad = sinNov ? 'sin' : (kwGrave ? 'grave' : 'menor');

    parteDraft = { nro, fecha, local, visitante, estadio, gravedad, detalle, fuente:'pdf', archivo: file.name };
  } catch (e) {
    alert('No se pudo leer el PDF: ' + e.message + '\nPodés cargar el parte manualmente.');
    parteDraft = { nro:'', fecha:'', local:'', visitante:'', estadio:'', gravedad:'sin', detalle:'' };
  }
  parteImportando = false; render();
  setTimeout(() => document.getElementById('pa-detalle')?.scrollIntoView({behavior:'smooth', block:'center'}), 100);
};

        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-size:11px;padding:4px 10px;border-radius:20px;background:${gv.bg};color:${gv.fg};font-weight:700">${gv.label}</span>
          <button class="btn-mini" style="color:#b91c1c" onclick="event.stopPropagation();eliminarParte('${pa.id}')">🗑</button>
        </div>
      </div>
      ${exp && pa.detalle ? `<div style="margin-top:10px;padding:10px;background:#f9fafb;border-radius:8px;font-size:12.5px;line-height:1.55;white-space:pre-wrap">${esc(pa.detalle)}</div>` : ''}
    </div>`;
  }).join('') : `<div class="empty">Sin partes cargados todavía. Importá el primer Informe U.C.O. en PDF.</div>`}`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// TAB USUARIOS — gestión de usuarios y permisos (solo administradores)
// ═══════════════════════════════════════════════════════════════════════════════
let formUsuario = false;
function renderTabUsuarios() {
  if (!currentUser?.admin) return `<div class="fc">Sin permisos para ver esta sección.</div>`;
  const adminsActivos = usuarios.filter(u => u.admin && u.activo !== false).length;
  return `
  <div class="fc">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:16px;font-weight:700">👥 Usuarios y permisos</div>
        <div style="font-size:12px;color:#6b7280;margin-top:3px">Los cambios impactan al instante, sin tocar el código. Cada usuario ve únicamente los módulos habilitados. Los administradores (★) ven todo y gestionan usuarios.</div>
      </div>
      <button class="btn-main" style="flex:none;padding:9px 16px" onclick="toggleFormUsuario()">${formUsuario ? '✖ Cancelar' : '➕ Nuevo usuario'}</button>
    </div>
    ${formUsuario ? `
    <div style="margin-top:14px;padding:14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px">
      <div class="fr fr2">
        <div><div class="sec-label">Usuario (para ingresar)</div><input id="nu-user" placeholder="Ej: PEREZ" style="text-transform:uppercase"></div>
        <div><div class="sec-label">Nombre / dependencia</div><input id="nu-nombre" placeholder="Ej: Of. Pérez — DIP"></div>
      </div>
      <div class="fr fr2">
        <div><div class="sec-label">Contraseña</div><input id="nu-clave" type="text" placeholder="Contraseña" autocomplete="off"></div>
        <div><div class="sec-label">Rol</div><select id="nu-admin"><option value="no">Usuario</option><option value="si">Administrador ★</option></select></div>
      </div>
      <div class="sec-label">Módulos habilitados</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        ${MODULOS.map(m => `<label style="display:flex;align-items:center;gap:6px;font-size:13px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:6px 10px;cursor:pointer"><input type="checkbox" class="nu-perm" value="${m.id}" checked style="width:15px;height:15px;accent-color:#0C447C"> ${m.label}</label>`).join('')}
      </div>
      <div class="btns-row" style="margin-top:12px"><button class="btn-main" style="flex:none;padding:9px 18px" onclick="crearUsuario()">💾 Crear usuario</button></div>
    </div>` : ''}
  </div>
  ${usuarios.slice().sort((a,b) => a.id.localeCompare(b.id)).map(u => usuarioCardHtml(u, adminsActivos)).join('')}
  <div class="fc" style="margin-top:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px">
      <div>
        <div style="font-size:15px;font-weight:700">🗑 Papelera (${papelera.length})</div>
        <div style="font-size:11.5px;color:#6b7280;margin-top:2px">Todo lo eliminado en la app queda acá y se puede restaurar con sus vínculos intactos.</div>
      </div>
      ${papelera.length ? `<button class="btn-mini" style="color:#b91c1c" onclick="vaciarPapelera()">Vaciar papelera</button>` : ''}
    </div>
    ${papelera.length ? papelera.slice(0,40).map(p => {
      const d = p.data || {};
      const detalle = d.local && d.visitante ? `${d.local} vs ${d.visitante}${d.fecha||d.fechaPartido?' · '+fmt(d.fecha||d.fechaPartido):''}` : (d.titulo || d.nombre || d.club || '');
      return `<div style="font-size:12px;padding:7px 0;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:center">
        <span><b>${esc(p.etiqueta || COL_LABEL[p.col] || p.col)}</b>${detalle ? ' — ' + esc(String(detalle).slice(0,80)) : ''} <span style="color:#9ca3af;font-size:10.5px">· eliminado ${fmt(p.eliminadoEn)}${p.por ? ' por ' + esc(p.por) : ''}</span></span>
        <span style="display:flex;gap:6px">
          <button class="btn-mini" style="background:#059669;color:#fff;border-color:#047857;padding:3px 10px" onclick="restaurarPapelera('${p.id}')">↩️ Restaurar</button>
          <button class="btn-mini" style="color:#b91c1c;padding:3px 8px" onclick="purgarPapelera('${p.id}')">✕</button>
        </span>
      </div>`;
    }).join('') + (papelera.length > 40 ? `<div style="font-size:11px;color:#6b7280;margin-top:6px">… y ${papelera.length-40} más.</div>` : '') : `<div class="empty" style="padding:14px">La papelera está vacía.</div>`}
  </div>`;
}
function usuarioCardHtml(u, adminsActivos) {
  const esYo = u.id === currentUser.id;
  const perms = u.admin ? TODOS_MODULOS : (u.permisos || []);
  const ultimoAdmin = u.admin && u.activo !== false && adminsActivos <= 1;
  return `
  <div class="fc" style="${u.activo === false ? 'opacity:.55' : ''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
      <div>
        <b style="font-size:15px">👤 ${esc(u.id)}</b>
        ${u.admin ? '<span style="color:#b45309;font-size:12px;font-weight:700"> ★ Admin</span>' : ''}
        ${esYo ? '<span style="font-size:11px;color:#2563eb"> (vos)</span>' : ''}
        ${u.activo === false ? '<span style="font-size:11px;color:#b91c1c;font-weight:700"> · DESHABILITADO</span>' : ''}
        <div style="font-size:12px;color:#6b7280">${esc(u.nombre || '—')}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-mini" onclick="cambiarClaveUsuario('${u.id}')">🔑 Cambiar clave</button>
        <button class="btn-mini" onclick="toggleAdminUsuario('${u.id}')" ${ultimoAdmin ? 'disabled title="Es el único administrador activo"' : ''}>${u.admin ? '⬇ Quitar admin' : '⬆ Hacer admin'}</button>
        <button class="btn-mini" onclick="toggleActivoUsuario('${u.id}')" ${esYo || ultimoAdmin ? 'disabled' : ''}>${u.activo === false ? '✅ Habilitar' : '🚫 Deshabilitar'}</button>
        <button class="btn-mini" style="color:#b91c1c;border-color:#fca5a5" onclick="eliminarUsuario('${u.id}')" ${esYo || ultimoAdmin ? 'disabled' : ''}>🗑 Eliminar</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
      ${MODULOS.map(m => `<label style="display:flex;align-items:center;gap:6px;font-size:12px;background:${perms.includes(m.id) ? '#eef4fb' : '#f9fafb'};border:1px solid ${perms.includes(m.id) ? '#bcd3ec' : '#e5e7eb'};border-radius:8px;padding:5px 9px;cursor:${u.admin ? 'not-allowed' : 'pointer'}"><input type="checkbox" ${perms.includes(m.id) ? 'checked' : ''} ${u.admin ? 'disabled' : ''} onchange="togglePermisoUsuario('${u.id}','${m.id}',this.checked)" style="width:14px;height:14px;accent-color:#0C447C"> ${m.label}</label>`).join('')}
    </div>
    ${u.admin ? '<div style="font-size:11px;color:#9ca3af;margin-top:6px">Los administradores tienen acceso a todos los módulos.</div>' : ''}
  </div>`;
}
window.toggleFormUsuario = () => { formUsuario = !formUsuario; render(); };
window.crearUsuario = async () => {
  const id = (document.getElementById('nu-user').value || '').trim().toUpperCase().replace(/[^A-Z0-9ÑÁÉÍÓÚ_-]/g, '');
  const nombre = (document.getElementById('nu-nombre').value || '').trim();
  const clave = document.getElementById('nu-clave').value;
  const admin = document.getElementById('nu-admin').value === 'si';
  const permisos = Array.from(document.querySelectorAll('.nu-perm:checked')).map(c => c.value);
  if (!id || !clave) { alert('Completá usuario y contraseña.'); return; }
  if (usuarios.some(u => u.id === id)) { alert('Ya existe un usuario con ese nombre.'); return; }
  if (!admin && permisos.length === 0) { alert('Habilitá al menos un módulo.'); return; }
  await setDoc(doc(db,'air_usuarios',id), { nombre, clave, admin, activo: true, permisos: admin ? TODOS_MODULOS : permisos, creado: serverTimestamp() });
  formUsuario = false; render();
};
window.cambiarClaveUsuario = async id => {
  const nueva = prompt(`Nueva contraseña para ${id}:`);
  if (!nueva) return;
  await updateDoc(doc(db,'air_usuarios',id), { clave: nueva });
  alert(`Contraseña de ${id} actualizada.`);
};
window.toggleAdminUsuario = async id => {
  const u = usuarios.find(x => x.id === id); if (!u) return;
  if (u.admin && !confirm(`¿Quitar rol de administrador a ${id}?`)) return;
  await updateDoc(doc(db,'air_usuarios',id), u.admin ? { admin: false } : { admin: true, permisos: TODOS_MODULOS });
};
window.toggleActivoUsuario = async id => {
  const u = usuarios.find(x => x.id === id); if (!u) return;
  await updateDoc(doc(db,'air_usuarios',id), { activo: u.activo === false });
};
window.eliminarUsuario = async id => {
  if (!confirm(`¿Eliminar al usuario ${id}? Esta acción no se puede deshacer.`)) return;
  await deleteDoc(doc(db,'air_usuarios',id));
};
window.togglePermisoUsuario = async (id, mod, on) => {
  const u = usuarios.find(x => x.id === id); if (!u || u.admin) return;
  const set = new Set(u.permisos || []);
  on ? set.add(mod) : set.delete(mod);
  if (set.size === 0) { alert('El usuario debe tener al menos un módulo habilitado.'); render(); return; }
  await updateDoc(doc(db,'air_usuarios',id), { permisos: Array.from(set) });
};

function render() {
  const c = document.getElementById('content-area'); if (!c || !st.perfilActual) return;
  const activeEl = document.activeElement; const activeId = activeEl?.id; const selStart = activeEl?.selectionStart;
  switch (st.tab) {
    case 'h': c.innerHTML = renderTabInicio(); break;
    case 'i': c.innerHTML = renderTabInformes(); break;
    case 'e': c.innerHTML = renderTabEquipos(); break;
    case 'v': c.innerHTML = renderTabRivalidades(); break;
    case 'r': c.innerHTML = renderTabRadicalizados(); break;
    case 'n': c.innerHTML = renderTabNoticias(); break;
    case 'p': c.innerHTML = renderTabPartes(); break;
    case 'u': c.innerHTML = renderTabUsuarios(); break;
  }
  if (activeId) { const el = document.getElementById(activeId); if (el && el.tagName !== 'BUTTON') { el.focus(); try{ el.setSelectionRange(selStart, selStart); }catch(e){} } }
}
window.st = st; window.abrirAnalisis = window.abrirAnalisis; // export para onclick inline
</script>
</body>
</html>
