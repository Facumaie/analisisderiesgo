<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis de Informes de Riesgo — DSED</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}
  .header{background:#0C447C;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
  .header-left{display:flex;align-items:center;gap:12px}
  .logo{width:38px;height:38px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .htitle{font-size:14px;font-weight:600;color:#fff}
  .hsub{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px}
  .tab-bar{display:flex;gap:2px;background:rgba(0,0,0,.2);border-radius:8px;padding:3px;flex-wrap:wrap}
  .tab{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.7);border:none;background:transparent;transition:.15s}
  .tab.active{background:#fff;color:#0C447C}
  .content{padding:16px 20px;max-width:920px;margin:0 auto}
  .perfil-badge{font-size:11px;color:#fff;background:rgba(255,255,255,.15);padding:5px 10px;border-radius:6px;cursor:pointer}

  .fc{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px}
  .sec-label{font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
  .fr{display:grid;gap:10px;margin-bottom:12px}
  .fr2{grid-template-columns:1fr 1fr}
  .fr3{grid-template-columns:1fr 1fr 1fr}
  .fr1{grid-template-columns:1fr}
  input,select,textarea{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 11px;font-size:13px;background:#fff;color:#111;font-family:inherit;outline:none;transition:.1s}
  input:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
  textarea{resize:vertical;min-height:82px;line-height:1.5}
  .btns-row{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
  .btn-main{flex:1;padding:10px;border-radius:8px;background:#0C447C;color:#fff;font-size:13px;font-weight:500;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.1s}
  .btn-main:hover{background:#185FA5}
  .btn-main:disabled{opacity:.5;cursor:not-allowed}
  .btn-sn{flex:1;padding:10px;border-radius:8px;background:#f3f4f6;color:#374151;font-size:13px;font-weight:500;border:1px solid #e5e7eb;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .btn-sn:hover{background:#e5e7eb}
  .btn-mini{padding:3px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#374151}

  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .sb{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px}
  .sn{font-size:22px;font-weight:600;color:#111}
  .sl{font-size:11px;color:#6b7280;margin-top:2px}
  .sb.riesgo-alto{background:#fee2e2;border-color:#ef4444}.sb.riesgo-alto .sn{color:#dc2626}
  .sb.riesgo-medio{background:#fef3c7;border-color:#f59e0b}.sb.riesgo-medio .sn{color:#b45309}
  .sb.riesgo-bajo{background:#d1fae5;border-color:#10b981}.sb.riesgo-bajo .sn{color:#047857}

  .bdg{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em}
  .bdg-ALTO{background:#dc2626;color:#fff}
  .bdg-MEDIO{background:#f59e0b;color:#fff}
  .bdg-BAJO{background:#059669;color:#fff}
  .bdg-outline-ALTO{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
  .bdg-outline-MEDIO{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
  .bdg-outline-BAJO{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
  .bdg-gris{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;font-weight:500}

  .rc{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;margin-bottom:8px}
  .rc.alto{border-left:4px solid #dc2626}
  .rc.medio{border-left:4px solid #f59e0b}
  .rc.bajo{border-left:4px solid #059669}
  .rc.pendiente{border-left:4px solid #9ca3af}

  /* Nivel de riesgo selector */
  .riesgo-sel{display:flex;gap:6px}
  .riesgo-btn{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;transition:.1s}
  .riesgo-btn.sel-ALTO{background:#dc2626;border-color:#991b1b;color:#fff}
  .riesgo-btn.sel-MEDIO{background:#f59e0b;border-color:#b45309;color:#fff}
  .riesgo-btn.sel-BAJO{background:#059669;border-color:#047857;color:#fff}

  /* Checklist */
  .chk-grupo{border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;overflow:hidden}
  .chk-grupo-h{background:#f9fafb;padding:8px 12px;font-size:12px;font-weight:600;color:#374151;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .chk-item{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;border-top:1px solid #f3f4f6;cursor:pointer}
  .chk-item:hover{background:#f9fafb}
  .chk-item input[type=checkbox]{width:17px;height:17px;flex-shrink:0;margin-top:1px;accent-color:#0C447C;cursor:pointer}
  .chk-item .txt{font-size:12.5px;color:#374151;line-height:1.4}
  .chk-item.done .txt{color:#9ca3af;text-decoration:line-through}
  .prog-bar{height:7px;background:#e5e7eb;border-radius:4px;overflow:hidden;flex:1}
  .prog-fill{height:100%;background:#059669;border-radius:4px;transition:.2s}

  .factor{display:flex;gap:8px;align-items:flex-start;padding:6px 10px;border-radius:8px;font-size:12px;margin-bottom:5px;line-height:1.4}
  .factor.pos{background:#fee2e2;color:#7f1d1d}
  .factor.neg{background:#d1fae5;color:#065f46}
  .factor.info{background:#f3f4f6;color:#374151}

  .search-bar{display:flex;gap:8px}
  .search-bar input{flex:1}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .chip{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #d1d5db;background:#fff;color:#374151}
  .chip:hover{background:#eff6ff;border-color:#3b82f6;color:#1e40af}

  .noticia{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:11px 14px;margin-bottom:7px}
  .noticia.alta{border-left:4px solid #dc2626}
  .noticia .nt{font-size:13px;font-weight:600;color:#111;line-height:1.35;margin-bottom:4px}
  .noticia .nm{font-size:11px;color:#6b7280;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .src-tag{background:#e0f2fe;color:#075985;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600}

  .persona-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px}
  .persona-avatar{width:36px;height:36px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .persona-info{flex:1;min-width:0}
  .persona-nombre{font-size:13.5px;font-weight:700;margin-bottom:4px}
  .persona-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
  .persona-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
  .tag-dni{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}
  .search-highlight{background:#fde047;border-radius:2px}

  .empty{text-align:center;padding:36px 16px;color:#9ca3af;font-size:13px;background:#fff;border:1px dashed #d1d5db;border-radius:12px}
  .rel-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;display:inline-block}
  .club-pill{display:inline-block;padding:3px 10px;border-radius:14px;font-size:11px;margin:2px;border:1px solid}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#0C447C,#062647);padding:16px}
  .login-card{background:#fff;border-radius:18px;padding:34px 30px;max-width:400px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.35);text-align:center}
  .login-logo{width:74px;height:74px;border-radius:16px;margin:0 auto 14px;background:#eef4fb;display:flex;align-items:center;justify-content:center;font-size:38px}
  .login-title{font-size:17px;font-weight:700;color:#111}
  .login-sub{font-size:12px;color:#6b7280;margin:4px 0 20px}
  .login-perfil-btns{display:flex;gap:8px;margin-bottom:16px}
  .login-perfil-btn{flex:1;padding:10px;border-radius:10px;border:1px solid #e5e7eb;background:#f9fafb;cursor:pointer;font-size:13px;font-weight:700;color:#6b7280}
  .login-perfil-btn .sub{display:block;font-size:10px;font-weight:400;margin-top:2px}
  .login-perfil-btn.activo{background:#0C447C;border-color:#0C447C;color:#fff}
  .login-input{margin-bottom:12px;text-align:center;font-size:15px;padding:11px}
  .login-btn{width:100%;padding:12px;border-radius:10px;background:#0C447C;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer}
  .login-error{background:#fee2e2;color:#7f1d1d;border:1px solid #fca5a5;border-radius:8px;padding:8px;font-size:12px;margin-bottom:12px}
  .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:400;display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;color:#374151}
  .spinner{width:22px;height:22px;border:3px solid #e5e7eb;border-top-color:#0C447C;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:720px){
    .fr2,.fr3{grid-template-columns:1fr}
    .stat-row{grid-template-columns:repeat(2,1fr)}
    .content{padding:12px}
    .header{padding:10px 12px}

  @media print{
    body{background:#fff}
    .header,.no-print{display:none!important}
    .content{max-width:100%;padding:0}

</style>

<body>

<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">🛡️</div>
    <div class="login-title">Análisis de Informes de Riesgo</div>
    <div class="login-sub">Departamento Seguridad en Eventos Deportivos · DPEM</div>
    <input type="text" id="login-user" class="login-input" placeholder="Usuario" autocomplete="off" style="text-transform:uppercase" onkeydown="if(event.key==='Enter') document.getElementById('login-pass').focus()">
    <div id="login-error-box"></div>
    <input type="password" id="login-pass" class="login-input" placeholder="Contraseña" autocomplete="off" onkeydown="if(event.key==='Enter') intentarLogin()">
    <button class="login-btn" onclick="intentarLogin()">Ingresar</button>
  </div>
</div>

<div id="loading-overlay" class="loading-overlay" style="display:none">
  <div class="spinner"></div> Conectando con Firebase...
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="logo">🛡️</div>
      <div>
        <div class="htitle">Análisis de Informes de Riesgo</div>
        <div class="hsub">Departamento Seguridad en Eventos Deportivos · DPEM</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="tab-bar">
        <button class="tab active" id="tab-h" onclick="setTab('h')">🏠 Inicio</button>
        <button class="tab" id="tab-i" onclick="setTab('i')">📋 Informes</button>
        <button class="tab" id="tab-e" onclick="setTab('e')">📊 Equipos</button>
        <button class="tab" id="tab-v" onclick="setTab('v')">⚔️ Rivalidades</button>
        <button class="tab" id="tab-r" onclick="setTab('r')">⚠️ Radicalizados</button>
        <button class="tab" id="tab-n" onclick="setTab('n')">📰 Noticias</button>
        <button class="tab" id="tab-u" onclick="setTab('u')" style="display:none">👥 Usuarios</button>
      </div>
      <span class="perfil-badge" id="perfil-badge" onclick="cerrarSesion()" title="Cerrar sesión">👤 — · 🚪</span>
    </div>
  </div>
  <div class="content" id="content-area"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, setDoc, updateDoc, deleteDoc, doc, getDoc, getDocs, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// ── LOGIN / USUARIOS — gestionados desde Firestore (colección air_usuarios) ──
// El admin agrega/quita usuarios y permisos desde la pestaña 👥 Usuarios,
// sin tocar el código. Primer ingreso: se crean DIP y DSED como admins.
const MODULOS = [
  { id:'h', label:'🏠 Inicio' },
  { id:'i', label:'📋 Informes' },
  { id:'e', label:'📊 Equipos' },
  { id:'v', label:'⚔️ Rivalidades' },
  { id:'r', label:'⚠️ Radicalizados' },
  { id:'n', label:'📰 Noticias' },
];
const TODOS_MODULOS = MODULOS.map(m => m.id);
let currentUser = null;
let usuarios = [];

async function seedUsuariosSiVacio() {
  const snap = await getDocs(collection(db,'air_usuarios'));
  if (!snap.empty) return;
  await setDoc(doc(db,'air_usuarios','DIP'),  { nombre:'División Informes Preventivos', clave:'DIP-UCO', admin:true, activo:true, permisos:TODOS_MODULOS, creado:serverTimestamp() });
  await setDoc(doc(db,'air_usuarios','DSED'), { nombre:'Departamento DSED', clave:'parte1', admin:true, activo:true, permisos:TODOS_MODULOS, creado:serverTimestamp() });
}

window.intentarLogin = async () => {
  const user = (document.getElementById('login-user').value||'').trim().toUpperCase();
  const pass = document.getElementById('login-pass').value;
  const box = document.getElementById('login-error-box');
  if (!user || !pass) { box.innerHTML = `<div class="login-error">⚠️ Completá usuario y contraseña</div>`; return; }
  box.innerHTML = `<div style="font-size:12px;color:#6b7280;margin-bottom:12px">Verificando...</div>`;
  try {
    await seedUsuariosSiVacio();
    const d = await getDoc(doc(db,'air_usuarios',user));
    if (!d.exists() || d.data().clave !== pass) {
      box.innerHTML = `<div class="login-error">⚠️ Usuario o contraseña incorrectos</div>`;
      document.getElementById('login-pass').value = ''; return;
    }
    if (d.data().activo === false) { box.innerHTML = `<div class="login-error">⚠️ Usuario deshabilitado. Contactá a un administrador.</div>`; return; }
    sessionStorage.setItem('air_user', user);
    iniciarApp(user, { id:user, ...d.data() });
  } catch(e) {
    box.innerHTML = `<div class="login-error">⚠️ Error de conexión: ${e.message}</div>`;
  }
};
window.cerrarSesion = () => {
  if (!confirm('¿Cerrar sesión?')) return;
  sessionStorage.removeItem('air_user');
  location.reload();
};

const firebaseConfig = {
  apiKey: "AIzaSyBCaMF3aUlEBxfKZLDCyksGwSgNsWUGHt0",
  authDomain: "reportediario-a65ad.firebaseapp.com",
  projectId: "reportediario-a65ad",
  storageBucket: "reportediario-a65ad.firebasestorage.app",
  messagingSenderId: "774251538034",
  appId: "1:774251538034:web:221fc5f6327612dd1c04eb"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ═══════════════════════════════════════════════════════════════════════════════

const NIVELES_REL = {
  max:  { label: 'RIVALIDAD MÁXIMA', color: '#dc2626', pts: 5, desc: 'Enemistad histórica, enfrentamientos frecuentes' },
  enem: { label: 'ENEMISTAD',        color: '#ea580c', pts: 4, desc: 'Hostilidad con antecedentes de violencia' },
  conf: { label: 'CONFLICTO',        color: '#d97706', pts: 3, desc: 'Problemas esporádicos, cruces previos' },
  tens: { label: 'TENSIÓN',          color: '#65a30d', pts: 2, desc: 'Riesgo moderado, cruces verbales o incidentes aislados' },
  resp: { label: 'RESPETO / BUENA RELACIÓN', color: '#0284c7', pts: -1, desc: 'Buena relación o respeto mutuo entre barras' },
};

function norm(s){ return (s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim(); }
const CLUBES = Object.keys(RIV).sort();

function getRelacion(a, b) {
  a = norm(a); b = norm(b);
  const da = RIV[a], dbb = RIV[b];
  for (const nivel of ['max','enem','conf','tens','resp']) {
    if ((da && da[nivel].map(norm).includes(b)) || (dbb && dbb[nivel].map(norm).includes(a))) return nivel;
  }
  return null;
}
function esRival(a, b) { const r = getRelacion(a,b); return r && r !== 'resp'; }
function getAlianzas(club) { const d = RIV[norm(club)]; return d ? d.ali : []; }

// MOTOR DE SUGERENCIA DE RIESGO
// Cruza: rivalidad directa · alianzas cruzadas · antecedentes en informes previos ·
// flags del perfil de equipo (interna en la barra) · datos del checklist.
// ═══════════════════════════════════════════════════════════════════════════════
function historialEquipo(club) {
  const n = norm(club);
  return informes.filter(inf => norm(inf.local) === n || norm(inf.visitante) === n);
}
function sugerirRiesgo(local, visitante, opts = {}) {
  const factores = []; let score = 0;
  const L = norm(local), V = norm(visitante);
  if (!L || !V) return { riesgo: 'BAJO', score: 0, factores: [{t:'info', txt:'Seleccioná ambos equipos para calcular la sugerencia.'}] };

  // 1) Rivalidad directa
  const rel = getRelacion(L, V);
  if (rel) {
    const nv = NIVELES_REL[rel];
    score += nv.pts;
    factores.push({ t: nv.pts > 0 ? 'pos' : 'neg', txt: `${nv.pts>0?'⚔️':'🤝'} Relación directa entre parcialidades: ${nv.label} (${nv.desc}).`, pts: nv.pts });
  } else {
    factores.push({ t: 'info', txt: 'ℹ️ Sin rivalidad directa registrada entre ambas parcialidades.', pts: 0 });
  }

  // 2) Alianzas cruzadas (ej.: Defensores de Belgrano ↔ Almirante Brown vs Morón)
  const cruces = [];
  getAlianzas(L).forEach(ali => { if (esRival(ali, V)) { const esMax = getRelacion(ali,V)==='max'; cruces.push({ pts: esMax?3:2, txt:`La radicalizada de ${L} mantiene vínculo de "amistad" con la de ${norm(ali)}, ${esMax?'clásico rival':'rival'} de ${V}. Podrían intentar sumarse a la parcialidad local.` }); } });
  getAlianzas(V).forEach(ali => { if (esRival(ali, L)) { const esMax = getRelacion(ali,L)==='max'; cruces.push({ pts: esMax?3:2, txt:`La radicalizada de ${V} mantiene vínculo de "amistad" con la de ${norm(ali)}, ${esMax?'clásico rival':'rival'} de ${L}.` }); } });
  cruces.forEach(c => { score += c.pts; factores.push({ t:'pos', txt: `🔗 Alianza cruzada: ${c.txt}`, pts: c.pts }); });

  // 3) Antecedentes en informes previos (últimos 24 meses)
  [L, V].forEach(club => {
    const hist = historialEquipo(club).filter(i => i.id !== opts.excluirId);
    const altos = hist.filter(i => i.riesgo === 'ALTO').length;
    const medios = hist.filter(i => i.riesgo === 'MEDIO').length;
    if (altos >= 2)      { score += 3; factores.push({ t:'pos', txt:`📕 ${club}: registra ${altos} informes previos con conflictividad ALTA.`, pts: 3 }); }
    else if (altos === 1){ score += 2; factores.push({ t:'pos', txt:`📙 ${club}: registra 1 informe previo con conflictividad ALTA.`, pts: 2 }); }
    else if (medios >= 2){ score += 1; factores.push({ t:'pos', txt:`📒 ${club}: registra ${medios} informes previos con conflictividad MEDIA.`, pts: 1 }); }
  });

  // 4) Flags del perfil de equipo
  [L, V].forEach(club => {
    const e = equiposExtra[club];
    if (e?.interna)   { score += 2; factores.push({ t:'pos', txt:`🔺 ${club}: interna / disputa de poder vigente en la facción radicalizada${e.internaDetalle ? ' ('+esc(e.internaDetalle)+')' : ''}.`, pts: 2 }); }
    if (e?.incidentesRecientes) { score += 2; factores.push({ t:'pos', txt:`🚨 ${club}: incidentes recientes registrados${e.incidentesDetalle ? ' ('+esc(e.incidentesDetalle)+')' : ''}.`, pts: 2 }); }
  });

  // 5) Datos del análisis (checklist / formulario)
  if (opts.visitantePermitida) { score += 2; factores.push({ t:'pos', txt:'👥 Encuentro con parcialidad visitante habilitada.', pts: 2 }); }
  if (opts.tipoPartido === 'clasico')     { score += 2; factores.push({ t:'pos', txt:'🏟️ Partido catalogado como CLÁSICO.', pts: 2 }); }
  if (opts.tipoPartido === 'definitorio') { score += 2; factores.push({ t:'pos', txt:'🏆 Partido DEFINITORIO (ascenso, descenso, clasificación o final).', pts: 2 }); }
  if (opts.trascendencia === 'alta')      { score += 1; factores.push({ t:'pos', txt:'📈 Trascendencia deportiva alta.', pts: 1 }); }
  if (opts.internacional) { score += 1; factores.push({ t:'pos', txt:'🌎 Encuentro internacional: contingente visitante sudamericano — coordinar con contrapartes del país de origen (protocolo 5.10).', pts: 1 }); }

  const riesgo = score >= 5 ? 'ALTO' : score >= 3 ? 'MEDIO' : 'BAJO';
  return { riesgo, score, factores };
}

// ═══════════════════════════════════════════════════════════════════════════════
const CHECKLIST = [
  { grupo: 'Del evento y día del partido', items: [
    { id:'ev_tipo',   txt:'Tipo de partido determinado (amistoso, torneo regular, clásico o definitorio)' },
    { id:'ev_trasc',  txt:'Trascendencia deportiva evaluada (posiciones en tabla, qué se juega cada equipo)' },
    { id:'ev_clima',  txt:'Día, horario y previsión climática relevados' },
    { id:'ev_socio',  txt:'Condiciones socioambientales significativas del entorno verificadas' },
  ]},
  { grupo: 'Del organizador', items: [
    { id:'org_cap',   txt:'Capacidad operativa y antecedentes del organizador en eventos previos' },
    { id:'org_sanc',  txt:'Antecedentes de sanciones previas del club organizador' },
  ]},
  { grupo: 'De las instalaciones', items: [
    { id:'ins_zona',  txt:'Ubicación del estadio y características de la zona y barrios circundantes' },
    { id:'ins_afo',   txt:'Capacidad habilitada del estadio verificada' },
    { id:'ins_fact',  txt:'Factores situacionales (escombros, obras, iluminación) relevados' },
  ]},
  { grupo: 'De los concurrentes', items: [
    { id:'con_cant',  txt:'Cantidad de concurrentes esperados estimada' },
    { id:'con_visit', txt:'Presencia o no de parcialidad visitante confirmada' },
    { id:'con_confl', txt:'Nivel de conflictividad interna de los clubes y antecedentes de violencia analizados' },
    { id:'con_trasl', txt:'Modalidad de traslado de las parcialidades, lugares y horarios de reunión' },
    { id:'con_restr', txt:'Cruce con restricciones judiciales/administrativas y derecho de admisión (Radicalizados)' },
  ]},
  { grupo: 'Fuentes de información', items: [
    { id:'fue_abier', txt:'Búsqueda en fuentes abiertas: medios periodísticos y redes sociales (pestaña Noticias)' },
    { id:'fue_ultimo',txt:'Último encuentro de cada equipo revisado (incidentes, cánticos, permanencias)' },
    { id:'fue_riv',   txt:'Rivalidades, amistades y alianzas cruzadas de ambas parcialidades verificadas' },
  ]},
];
const CHECKLIST_TOTAL = CHECKLIST.reduce((a,g) => a + g.items.length, 0);

// ═══════════════════════════════════════════════════════════════════════════════
// TAB INFORMES — Fixture + Análisis + Confección del informe
// ═══════════════════════════════════════════════════════════════════════════════
window.abrirFormPartido = () => { st.formPartido = true; render(); };
window.cerrarFormPartido = () => { st.formPartido = false; render(); };
window.setFiltroInformes = f => { st.filtroInformes = f; render(); };

window.guardarPartido = async () => {
  const g = id => document.getElementById(id)?.value?.trim() || '';
  const local = g('fx-local'), visitante = g('fx-visitante'), fecha = g('fx-fecha');
  if (!local || !visitante || !fecha) { alert('Completá local, visitante y fecha.'); return; }
  await addDoc(collection(db,'air_fixture'), {
    local: norm(local), visitante: norm(visitante), fecha,
    hora: g('fx-hora'), estadio: g('fx-estadio'), torneo: g('fx-torneo'),
    visitantePermitida: document.getElementById('fx-visit').checked,
    internacional: document.getElementById('fx-inter').checked,
    ts: serverTimestamp()
  });
  st.formPartido = false; render();
};
window.eliminarPartido = async id => {
  const inf = informes.find(i => i.partidoId === id);
  if (!confirm('¿Eliminar este partido del fixture?' + (inf ? '\n(El informe asociado NO se elimina)' : ''))) return;
  await deleteDoc(doc(db,'air_fixture', id));
};

function informeDePartido(pid) { return informes.find(i => i.partidoId === pid); }

window.abrirAnalisis = pid => { st.partidoAbierto = pid; render(); window.scrollTo(0,0); };
window.cerrarAnalisis = () => { st.partidoAbierto = null; render(); };

// Estado local del análisis en curso (antes de guardar)
let anDraft = null;
function cargarDraft(p) {
  const inf = informeDePartido(p.id);
  if (anDraft && anDraft.partidoId === p.id) return anDraft;
  anDraft = inf ? {
    partidoId: p.id, infId: inf.id,
    checklist: { ...(inf.checklist||{}) },
    tipoPartido: inf.tipoPartido || 'regular',
    trascendencia: inf.trascendencia || 'media',
    visitantePermitida: inf.visitantePermitida ?? p.visitantePermitida ?? false,
    riesgo: inf.riesgo || null,
    analisis: inf.analisis || '',
    iniciales: inf.iniciales || '',
    estado: inf.estado || 'borrador',
  } : {
    partidoId: p.id, infId: null, checklist: {},
    tipoPartido: 'regular', trascendencia: 'media',
    visitantePermitida: p.visitantePermitida ?? false,
    riesgo: null, analisis: '', iniciales: '', estado: 'borrador',
  };
  return anDraft;
}
window.toggleChk = id => { anDraft.checklist[id] = !anDraft.checklist[id]; render(); };
window.setAnCampo = (campo, val) => { anDraft[campo] = val; render(); };
window.setAnTexto = (campo, val) => { anDraft[campo] = val; }; // sin re-render (inputs de texto)
window.setRiesgoManual = r => { anDraft.riesgo = r; render(); };

window.generarBorradorTexto = () => {
  const p = fixture.find(x => x.id === st.partidoAbierto); if (!p) return;
  const sug = sugerirRiesgo(p.local, p.visitante, { ...anDraft, internacional: p.internacional, excluirId: anDraft.infId });
  const riesgo = anDraft.riesgo || sug.riesgo;
  let t = `Espectáculo deportivo a celebrarse el ${fechaLarga(p.fecha)}${p.hora ? ', a las '+p.hora+' horas' : ''}, frente a su par el ${p.visitante}.\n\n`;
  t += `En virtud de las razones que posteriormente se expondrán, se gradúa el presente encuentro futbolístico como: CONFLICTIVIDAD ${riesgo}.\n\n`;
  const razones = sug.factores.filter(f => f.t === 'pos').map(f => '— ' + f.txt.replace(/^[^\s]+\s/, ''));
  if (razones.length) t += razones.join('\n') + '\n\n';
  if (!anDraft.visitantePermitida) t += 'El encuentro se disputará sin parcialidad visitante.\n\n';
  t += '[Completar con la información recabada en fuentes abiertas, último encuentro y demás antecedentes.]';
  anDraft.analisis = t;
  render();
};

window.guardarInforme = async (finalizar = false) => {
  const p = fixture.find(x => x.id === st.partidoAbierto); if (!p || !anDraft) return;
  anDraft.analisis  = document.getElementById('an-texto')?.value ?? anDraft.analisis;
  anDraft.iniciales = document.getElementById('an-iniciales')?.value ?? anDraft.iniciales;
  const sug = sugerirRiesgo(p.local, p.visitante, { ...anDraft, internacional: p.internacional, excluirId: anDraft.infId });
  const hechos = Object.values(anDraft.checklist).filter(Boolean).length;

  if (finalizar) {
    const faltan = [];
    CHECKLIST.forEach(g => g.items.forEach(it => { if (!anDraft.checklist[it.id]) faltan.push(it.txt); }));
    if (!anDraft.riesgo && !sug.riesgo) { alert('Definí el nivel de riesgo.'); return; }
    if (!anDraft.analisis.trim()) { alert('El informe no tiene texto de análisis.'); return; }
    if (faltan.length > 0 && !confirm(`⚠️ Checklist incompleto — faltan ${faltan.length} puntos del análisis:\n\n• ${faltan.slice(0,6).join('\n• ')}${faltan.length>6 ? '\n• …' : ''}\n\n¿Finalizar el informe de todas formas?`)) return;
  }
  const data = {
    partidoId: p.id, local: p.local, visitante: p.visitante,
    fechaPartido: p.fecha, hora: p.hora || '', estadio: p.estadio || '', torneo: p.torneo || '',
    checklist: anDraft.checklist, checklistHechos: hechos, checklistTotal: CHECKLIST_TOTAL,
    tipoPartido: anDraft.tipoPartido, trascendencia: anDraft.trascendencia,
    visitantePermitida: anDraft.visitantePermitida,
    riesgo: anDraft.riesgo || sug.riesgo, riesgoSugerido: sug.riesgo, score: sug.score,
    factores: sug.factores.map(f => f.txt),
    analisis: anDraft.analisis, iniciales: anDraft.iniciales,
    estado: finalizar ? 'finalizado' : 'borrador',
    actualizado: serverTimestamp(),
  };
  if (anDraft.infId) await updateDoc(doc(db,'air_informes', anDraft.infId), data);
  else { data.creado = serverTimestamp(); const ref = await addDoc(collection(db,'air_informes'), data); anDraft.infId = ref.id; }
  if (finalizar) { anDraft = null; st.partidoAbierto = null; }
  render();
};
window.eliminarInforme = async id => {
  if (!confirm('¿Eliminar este informe?')) return;
  await deleteDoc(doc(db,'air_informes', id)); anDraft = null; render();
};

// Consolidado (formato DIP)
window.generarConsolidado = () => {
  const fins = informes.filter(i => i.estado === 'finalizado').sort((a,b) => (a.fechaPartido||'').localeCompare(b.fechaPartido||''));
  if (!fins.length) { alert('No hay informes finalizados para consolidar.'); return; }
  const hoy = new Date();
  const nro = prompt('Número de Análisis de Riesgo:', String((informes.filter(i=>i.nroConsolidado).length||0) + 1));
  if (nro === null) return;
  let t = `INFORME DE ANÁLISIS DE RIESGO\nDivisión Informes Preventivos — Departamento Seguridad en Eventos Deportivos\n\n`;
  t += `Análisis de Riesgo Nro. ${nro}\nC.A.B.A., ${hoy.getDate()} de ${MESES[hoy.getMonth()]} del ${hoy.getFullYear()}\n\n`;
  t += `A los Señores integrantes del Comité de\nSeguridad en el Fútbol C.A.B.A.\nS__/__D.\n\n`;
  t += `Tengo el agrado de dirigirme a ese honorable comité a los fines de llevar a la órbita de su conocimiento el presente informe de análisis de riesgo, el cual es realizado en cumplimiento de la normativa vigente, de conformidad con lo establecido mediante la Ley 5.847, Artículo 6, incisos J, K; el Decreto Reglamentario N° 178/2019, Artículo 19; y la Ley N° 5.688, Artículo 90, inciso 15, ss. y cs.\n\n`;
  t += `A su vez, la confección se elabora a partir de la utilización de puntos centrales como son, el estudio de la rivalidad entre los equipos protagonistas del encuentro futbolístico, la relación entre ambas parcialidades simpatizantes, incidencias, enfrentamientos entre concurrentes organizados del mismo equipo, entre otros factores de atribución de riesgo. De esta manera, se categorizará como BAJA, MEDIA, o ALTA, la potencial conflictividad.\n\n`;
  t += `Por otro lado, se deja constancia que la categoría asignada por el personal a mí digno cargo, dependiente del Departamento Seguridad en Eventos Deportivos de la Dirección Prevención en Eventos Masivos, resulta ser meramente orientativa pudiendo diferir de la realidad, enfatizando que la respuesta aquí brindada no resulta ser vinculante a los fines de decidir respecto de la afectación del personal de la fuerza y/o la planificación del sistema de seguridad específico, sirviendo únicamente como material de apoyo específico a los fines de diagramar con mayor precisión el dispositivo de seguridad.\n\n`;
  t += `${'='.repeat(70)}\n\n`;
  fins.forEach(i => {
    t += `Club ${i.local}\n\n`;
    t += i.analisis.trim() + '\n';
    if (i.iniciales) t += `${i.iniciales}\n`;
    t += `\n${'-'.repeat(70)}\n\n`;
  });
  t += `Sin otro particular, saludo a Uds. muy atte.\n`;
  navigator.clipboard.writeText(t).then(() => alert(`✅ Informe consolidado Nro. ${nro} copiado al portapapeles (${fins.length} encuentros).`));
};

function renderTabInformes() {
  // ── Vista de análisis de un partido ──────────────────────────────────────────
  if (st.partidoAbierto) {
    const p = fixture.find(x => x.id === st.partidoAbierto);
    if (!p) { st.partidoAbierto = null; return renderTabInformes(); }
    const d = cargarDraft(p);
    const sug = sugerirRiesgo(p.local, p.visitante, { ...d, internacional: p.internacional, excluirId: d.infId });
    const riesgoActual = d.riesgo || sug.riesgo;
    const hechos = Object.values(d.checklist).filter(Boolean).length;
    const pct = Math.round(hechos / CHECKLIST_TOTAL * 100);
    const faltan = CHECKLIST_TOTAL - hechos;

    const checklistHtml = CHECKLIST.map(g => {
      const gHechos = g.items.filter(it => d.checklist[it.id]).length;
      return `<div class="chk-grupo">
        <div class="chk-grupo-h"><span>${g.grupo}</span><span style="font-size:11px;color:${gHechos===g.items.length?'#059669':'#9ca3af'}">${gHechos}/${g.items.length}</span></div>
        ${g.items.map(it => `
          <label class="chk-item ${d.checklist[it.id]?'done':''}">
            <input type="checkbox" ${d.checklist[it.id]?'checked':''} onchange="toggleChk('${it.id}')">
            <span class="txt">${it.txt}</span>
          </label>`).join('')}
      </div>`;
    }).join('');

    return `
      <div class="no-print" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <button class="btn-mini" onclick="cerrarAnalisis()">← Volver al fixture</button>
        <span class="bdg bdg-gris">${d.estado === 'finalizado' ? '✅ Finalizado' : '📝 Borrador'}</span>
      </div>

      <div class="fc">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:6px">
          <div style="font-size:16px;font-weight:700">${p.local} <span style="color:#9ca3af;font-weight:400">vs</span> ${p.visitante}</div>
          <span class="bdg bdg-${riesgoActual}">CONFLICTIVIDAD ${riesgoActual}</span>
        </div>
        <div style="font-size:12px;color:#6b7280">📅 ${fechaLarga(p.fecha)}${p.hora?' · 🕒 '+p.hora+' hs':''}${p.estadio?' · 🏟️ '+esc(p.estadio):''}${p.torneo?' · 🏆 '+esc(p.torneo):''}${p.internacional?' · 🌎 Internacional':''}</div>
      </div>

      <div class="fc">
        <div class="sec-label" style="margin-bottom:8px">🤖 Riesgo sugerido por el sistema — CONFLICTIVIDAD ${sug.riesgo} (puntaje ${sug.score})</div>
        ${sug.factores.map(f => `<div class="factor ${f.t}">${f.txt}${f.pts ? ` <span style="margin-left:auto;font-weight:700;white-space:nowrap">${f.pts>0?'+':''}${f.pts}</span>` : ''}</div>`).join('')}
        <div class="sec-label" style="margin:12px 0 6px">Nivel de riesgo asignado (modificable)</div>
        <div class="riesgo-sel">
          <button class="riesgo-btn ${riesgoActual==='BAJO'?'sel-BAJO':''}"  onclick="setRiesgoManual('BAJO')">🟢 BAJO</button>
          <button class="riesgo-btn ${riesgoActual==='MEDIO'?'sel-MEDIO':''}" onclick="setRiesgoManual('MEDIO')">🟡 MEDIO</button>
          <button class="riesgo-btn ${riesgoActual==='ALTO'?'sel-ALTO':''}"  onclick="setRiesgoManual('ALTO')">🔴 ALTO</button>
        </div>
        ${d.riesgo && d.riesgo !== sug.riesgo ? `<div style="font-size:11px;color:#92400e;background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:6px 10px;margin-top:8px">✏️ Nivel modificado manualmente (el sistema sugería ${sug.riesgo}).</div>` : ''}
      </div>

      <div class="fc">
        <div class="sec-label" style="margin-bottom:8px">Datos del encuentro para el cálculo</div>
        <div class="fr fr3">
          <div><div class="sec-label">Tipo de partido</div>
            <select onchange="setAnCampo('tipoPartido', this.value)">
              <option value="amistoso" ${d.tipoPartido==='amistoso'?'selected':''}>Amistoso</option>
              <option value="regular" ${d.tipoPartido==='regular'?'selected':''}>Torneo regular</option>
              <option value="clasico" ${d.tipoPartido==='clasico'?'selected':''}>Clásico</option>
              <option value="definitorio" ${d.tipoPartido==='definitorio'?'selected':''}>Definitorio</option>
            </select></div>
          <div><div class="sec-label">Trascendencia deportiva</div>
            <select onchange="setAnCampo('trascendencia', this.value)">
              <option value="baja" ${d.trascendencia==='baja'?'selected':''}>Baja</option>
              <option value="media" ${d.trascendencia==='media'?'selected':''}>Media</option>
              <option value="alta" ${d.trascendencia==='alta'?'selected':''}>Alta</option>
            </select></div>
          <div><div class="sec-label">Parcialidad visitante</div>
            <select onchange="setAnCampo('visitantePermitida', this.value==='SI')">
              <option value="NO" ${!d.visitantePermitida?'selected':''}>Sin visitante</option>
              <option value="SI" ${d.visitantePermitida?'selected':''}>Con visitante</option>
            </select></div>
        </div>
      </div>

      <div class="fc">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div class="sec-label" style="margin:0">✅ Checklist de análisis (Protocolo 4-OPP-010-SOPE · 5.3.1)</div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pct===100?'#059669':pct>=50?'#f59e0b':'#dc2626'}"></div></div>
          <span style="font-size:12px;font-weight:700;color:${pct===100?'#059669':'#6b7280'};white-space:nowrap">${hechos}/${CHECKLIST_TOTAL}</span>
        </div>
        ${faltan > 0 ? `<div style="font-size:11px;color:#92400e;background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:6px 10px;margin-bottom:10px">⚠️ Faltan <b>${faltan}</b> puntos del análisis para completar el checklist.</div>` : `<div style="font-size:11px;color:#065f46;background:#d1fae5;border:1px solid #6ee7b7;border-radius:8px;padding:6px 10px;margin-bottom:10px">✅ Checklist completo.</div>`}
        ${checklistHtml}
        <div class="btns-row no-print" style="margin-top:10px">
          <button class="btn-sn" onclick="buscarNoticiasPartido('${p.local.replace(/'/g,"\\'")}','${p.visitante.replace(/'/g,"\\'")}')">📰 Buscar noticias del encuentro</button>
          <button class="btn-sn" onclick="st.rivA='${p.local.replace(/'/g,"\\'")}';st.rivB='${p.visitante.replace(/'/g,"\\'")}';setTab('v')">⚔️ Ver rivalidad</button>
        </div>
      </div>

      <div class="fc">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
          <div class="sec-label" style="margin:0">📝 Texto del informe (Club ${p.local})</div>
          <button class="btn-mini" onclick="generarBorradorTexto()">✨ Generar borrador a partir de los factores</button>
        </div>
        <textarea id="an-texto" style="min-height:190px" placeholder="Espectáculo deportivo a celebrarse el ... frente a su par el ... Se gradúa el presente encuentro futbolístico como: CONFLICTIVIDAD ..." oninput="setAnTexto('analisis', this.value)">${esc(d.analisis)}</textarea>
        <div class="fr fr2" style="margin-top:10px">
          <div><div class="sec-label">Iniciales del analista</div>
          <input type="text" id="an-iniciales" placeholder="Ej: L.N.M." value="${esc(d.iniciales)}" oninput="setAnTexto('iniciales', this.value)"></div>
        </div>
      </div>

      <div class="btns-row no-print" style="margin-bottom:20px">
        <button class="btn-sn" onclick="guardarInforme(false)">💾 Guardar borrador</button>
        <button class="btn-main" onclick="guardarInforme(true)">✅ Finalizar informe</button>
        ${d.infId ? `<button class="btn-mini" style="background:#fee2e2;border-color:#fca5a5;color:#7f1d1d" onclick="eliminarInforme('${d.infId}')">🗑</button>` : ''}
      </div>`;
  }

  // ── Vista fixture / listado ───────────────────────────────────────────────────
  anDraft = null;
  const opcionesClubes = `<option value="">— Seleccionar —</option>` + CLUBES.map(c => `<option>${c}</option>`).join('');
  const formHtml = st.formPartido ? `
    <div class="fc" style="border:2px solid #0C447C">
      <div class="sec-label" style="margin-bottom:10px">➕ Cargar partido al fixture</div>
      <div class="fr fr2">
        <div><div class="sec-label">Equipo local *</div><input list="dl-clubes" id="fx-local" placeholder="Ej: ALL BOYS"></div>
        <div><div class="sec-label">Equipo visitante *</div><input list="dl-clubes" id="fx-visitante" placeholder="Ej: NUEVA CHICAGO"></div>
      </div>
      <datalist id="dl-clubes">${CLUBES.map(c=>`<option value="${c}">`).join('')}</datalist>
      <div class="fr fr3">
        <div><div class="sec-label">Fecha *</div><input type="date" id="fx-fecha"></div>
        <div><div class="sec-label">Hora</div><input type="time" id="fx-hora"></div>
        <div><div class="sec-label">Torneo</div><input type="text" id="fx-torneo" placeholder="Ej: Primera Nacional"></div>
      </div>
      <div class="fr fr1"><div><div class="sec-label">Estadio</div><input type="text" id="fx-estadio" placeholder="Ej: Islas Malvinas — Floresta"></div></div>
      <div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer"><input type="checkbox" id="fx-visit" style="width:17px;height:17px;accent-color:#0C447C"> Con parcialidad visitante</label>
        <label style="display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer"><input type="checkbox" id="fx-inter" style="width:17px;height:17px;accent-color:#0C447C"> 🌎 Encuentro internacional (equipo sudamericano)</label>
      </div>
      <div class="btns-row"><button class="btn-main" onclick="guardarPartido()">💾 Agregar al fixture</button><button class="btn-sn" onclick="cerrarFormPartido()">Cancelar</button></div>
    </div>` : '';

  const hoyISO = new Date().toISOString().slice(0,10);
  let lista = fixture.slice();
  const fins = informes.filter(i => i.estado === 'finalizado');
  if (st.filtroInformes === 'pendientes') lista = lista.filter(p => { const i = informeDePartido(p.id); return !i || i.estado !== 'finalizado'; });
  if (st.filtroInformes === 'finalizados') lista = lista.filter(p => informeDePartido(p.id)?.estado === 'finalizado');

  const cards = lista.map(p => {
    const inf = informeDePartido(p.id);
    const sug = !inf ? sugerirRiesgo(p.local, p.visitante, { visitantePermitida: p.visitantePermitida, internacional: p.internacional }) : null;
    const cls = inf ? (inf.riesgo||'').toLowerCase() : 'pendiente';
    const pasado = p.fecha < hoyISO;

function googleNewsUrl(q){ return `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=es-419&gl=AR&ceid=AR:es`; }
function redditSearchUrl(sub,q){ return `https://www.reddit.com/r/${sub}/search.rss?q=${encodeURIComponent(q)}&restrict_sr=on&sort=new&t=year`; }

const KEYWORDS_DURAS = ['barra','hincha','radicaliz','faccion','violencia','incidente','disturbio','detenido','ultra','aguante','traslado','concentracion','banderazo','captura','admision','enfrentamiento','arresto','detencion','pelea','agresion','herido','tiroteo','pirotecnia'];

// Presets de búsqueda rápida (un click, sin filtros)
const PRESETS = [
  'Violencia fútbol argentino incidentes',
  'Barras bravas Argentina',
  'Incidentes hinchas Primera Nacional',
  'Derecho de admisión estadio Argentina',
  'Hinchas Copa Libertadores Argentina incidentes',
  'Hinchas Copa Sudamericana Buenos Aires',
  'Barra brava interna disputa',
  'Operativo policial cancha Buenos Aires',
];

let notResultados = [], notCargando = false, notQuery = '';

async function fetchFeedXml(url, tipo) {
  const proxied = `/.netlify/functions/rss-proxy?url=${encodeURIComponent(url)}`;
  const intentos = [proxied, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
  for (const u of intentos) {
    try {
      const r = await fetch(u, { signal: AbortSignal.timeout(12000) });
      if (!r.ok) continue;
      return await r.text();
    } catch(e) {}
  }
  return null;
}
function extraerTag(block, tag){ const m = block.match(new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`,'i')); return m ? m[1].replace(/<!\[CDATA\[|\]\]>/g,'').trim() : ''; }
function parseItems(xml, fuente, esAtom) {
  const items = []; if (!xml) return items;
  const rx = esAtom ? /<entry>([\s\S]*?)<\/entry>/g : /<item>([\s\S]*?)<\/item>/g;
  let m;
  while ((m = rx.exec(xml)) !== null) {
    const b = m[1];
    let link = '';
    if (esAtom) { const lm = b.match(/<link[^>]*href="([^"]+)"/i); link = lm ? lm[1] : extraerTag(b,'id'); }
    else link = extraerTag(b,'link') || extraerTag(b,'guid');
    const titulo = extraerTag(b,'title').replace(/<[^>]+>/g,'');
    const fecha = extraerTag(b, esAtom?'updated':'pubDate') || extraerTag(b,'published');
    const desc = (extraerTag(b,'description') || extraerTag(b,'content') || extraerTag(b,'summary')).replace(/<[^>]+>/g,'').slice(0,200);
    if (titulo) items.push({ titulo, link, fecha, desc, fuente });
  }
  return items.slice(0, 25);
}

window.buscarNoticias = async (q) => {
  q = (q ?? document.getElementById('not-q')?.value ?? '').trim();
  if (!q) { alert('Escribí qué querés buscar.'); return; }
  notQuery = q; notCargando = true; notResultados = []; render();
  // Una sola búsqueda dispara consultas paralelas en varios medios y fuentes:
  const fuentes = [
    { f:'Google News',  url: googleNewsUrl(q), atom:false },
    { f:'Olé',          url: googleNewsUrl(`site:ole.com.ar ${q}`), atom:false },
    { f:'Infobae',      url: googleNewsUrl(`site:infobae.com ${q}`), atom:false },
    { f:'TyC Sports',   url: googleNewsUrl(`site:tycsports.com ${q}`), atom:false },
    { f:'Clarín',       url: googleNewsUrl(`site:clarin.com ${q}`), atom:false },
    { f:'La Nación',    url: googleNewsUrl(`site:lanacion.com.ar ${q}`), atom:false },
    { f:'Doble Amarilla', url: googleNewsUrl(`site:dobleamarilla.com.ar ${q}`), atom:false },
    { f:'Reddit r/Argentina', url: redditSearchUrl('Argentina', q), atom:true },
    { f:'Reddit r/futbol',    url: redditSearchUrl('futbol', q), atom:true },
  ];
  const res = await Promise.allSettled(fuentes.map(async s => parseItems(await fetchFeedXml(s.url), s.f, s.atom)));
  const vistos = new Set(); const todos = [];
  res.forEach(r => { if (r.status === 'fulfilled') r.value.forEach(n => {
    const k = n.titulo.toLowerCase().slice(0,80);
    if (!vistos.has(k)) { vistos.add(k); todos.push(n); }
  });});
  todos.forEach(n => { n.t = new Date(n.fecha).getTime() || 0; n.alta = KEYWORDS_DURAS.some(k => (n.titulo+' '+n.desc).toLowerCase().includes(k)); });
  todos.sort((a,b) => (b.alta - a.alta) || (b.t - a.t));
  notResultados = todos; notCargando = false; render();
};

        <div class="noticia ${n.alta?'alta':''}">
          <div class="nt"><a href="${n.link}" target="_blank" style="color:inherit;text-decoration:none">${esc(n.titulo)}</a></div>
          ${n.desc ? `<div style="font-size:11.5px;color:#6b7280;margin-bottom:4px;line-height:1.4">${esc(n.desc)}</div>` : ''}
          <div class="nm">
            <span class="src-tag">${n.fuente}</span>
            ${n.alta ? '<span class="src-tag" style="background:#fee2e2;color:#991b1b">🔴 relevancia alta</span>' : ''}

          </div>

window.importarExcelR = (input) => {
  const file = input.files[0]; if (!file) return;
  const cargar = () => {
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:'' });
        const buscar = (row, claves) => { for (const k of Object.keys(row)) { const kn = norm(k); if (claves.some(c => kn.includes(c))) return String(row[k]).trim(); } return ''; };
        const existentes = new Set(radicalizados.map(r => r.dni || norm(r.nombre)));
        let nuevos = 0;
        for (const row of rows) {
          const nombre = buscar(row, ['NOMBRE','APELLIDO']); if (!nombre) continue;
          const dni = buscar(row, ['DNI','DOCUMENTO']);
          if (existentes.has(dni || norm(nombre))) continue;
          await addDoc(collection(db,'radicalizados_copa'), {
            nombre: nombre.toUpperCase(), dni,
            club: buscar(row,['CLUB','BARRA','FACCION']).toUpperCase(),
            resolucion: buscar(row,['RESOL','EXPEDIENTE']),
            motivo: buscar(row,['MOTIVO']),
            obs: buscar(row,['OBS','APODO','ALIAS']),
            admision: /si|1|x/i.test(buscar(row,['ADMISION'])) ? 'SI':'NO',
            captura: /si|1|x/i.test(buscar(row,['CAPTURA'])) ? 'SI':'NO',
            ts: serverTimestamp()
          });
          existentes.add(dni || norm(nombre)); nuevos++;
        }
        alert(`✅ Importación finalizada: ${nuevos} personas nuevas (duplicados omitidos).`);
      } catch(err) { alert('Error al leer el archivo: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  };
  if (typeof XLSX === 'undefined') { const s = document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'; s.onload = cargar; document.head.appendChild(s); }
  else cargar();
  input.value = '';
};

  await setDoc(doc(db,'air_usuarios',id), { nombre, clave, admin, activo: true, permisos: admin ? TODOS_MODULOS : permisos, creado: serverTimestamp() });
  formUsuario = false; render();
};
window.cambiarClaveUsuario = async id => {
  const nueva = prompt(`Nueva contraseña para ${id}:`);
  if (!nueva) return;
  await updateDoc(doc(db,'air_usuarios',id), { clave: nueva });
  alert(`Contraseña de ${id} actualizada.`);
};
window.toggleAdminUsuario = async id => {
  const u = usuarios.find(x => x.id === id); if (!u) return;
  if (u.admin && !confirm(`¿Quitar rol de administrador a ${id}?`)) return;
  await updateDoc(doc(db,'air_usuarios',id), u.admin ? { admin: false } : { admin: true, permisos: TODOS_MODULOS });
};
window.toggleActivoUsuario = async id => {
  const u = usuarios.find(x => x.id === id); if (!u) return;
  await updateDoc(doc(db,'air_usuarios',id), { activo: u.activo === false });
};
window.eliminarUsuario = async id => {
  if (!confirm(`¿Eliminar al usuario ${id}? Esta acción no se puede deshacer.`)) return;
  await deleteDoc(doc(db,'air_usuarios',id));
};
window.togglePermisoUsuario = async (id, mod, on) => {
  const u = usuarios.find(x => x.id === id); if (!u || u.admin) return;
  const set = new Set(u.permisos || []);
  on ? set.add(mod) : set.delete(mod);
  if (set.size === 0) { alert('El usuario debe tener al menos un módulo habilitado.'); render(); return; }
  await updateDoc(doc(db,'air_usuarios',id), { permisos: Array.from(set) });
};

function render() {
  const c = document.getElementById('content-area'); if (!c || !st.perfilActual) return;
  const activeEl = document.activeElement; const activeId = activeEl?.id; const selStart = activeEl?.selectionStart;
  switch (st.tab) {
    case 'h': c.innerHTML = renderTabInicio(); break;
    case 'i': c.innerHTML = renderTabInformes(); break;
    case 'e': c.innerHTML = renderTabEquipos(); break;
    case 'v': c.innerHTML = renderTabRivalidades(); break;
    case 'r': c.innerHTML = renderTabRadicalizados(); break;
    case 'n': c.innerHTML = renderTabNoticias(); break;
    case 'u': c.innerHTML = renderTabUsuarios(); break;
  }
  if (activeId) { const el = document.getElementById(activeId); if (el && el.tagName !== 'BUTTON') { el.focus(); try{ el.setSelectionRange(selStart, selStart); }catch(e){} } }
}
window.st = st; window.abrirAnalisis = window.abrirAnalisis; // export para onclick inline
</script>
