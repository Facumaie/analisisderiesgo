[build]
  functions = "netlify/functions"
  publish = "."

[build.environment]
  # La apiKey web de Firebase es pública por diseño (no es un secreto);
  # se omite del secrets scanning de Netlify para que no bloquee el deploy.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyBCaMF3aUlEBxfKZLDCyksGwSgNsWUGHt0"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
