[build]
  functions = "netlify/functions"
  publish = "."

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# Cron de alertas Telegram.
# Netlify ejecuta los crons en UTC: ARG 08-20 cada 2 hs -> UTC 11-23.
[functions."check-noticias-cron"]
  schedule = "0 11,13,15,17,19,21,23 * * *"
